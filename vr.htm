<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тур 360 — Редактор (финальная версия)</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        html, body { height: 100%; margin: 0; }
        body { font-family: system-ui, sans-serif; background: #12131c; padding: 20px; color: #eef2ff; display: flex; justify-content: center; align-items: flex-start; }
        .app { max-width: 1400px; margin: 0 auto; background: #1e1f2e; border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); width: 100%; }
        h1 { font-size: 1.6rem; margin: 0 0 4px 0; background: linear-gradient(135deg,#FFB347,#FF7E05); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .sub { color: #9ca3af; margin-bottom: 20px; border-left: 3px solid #ff8c42; padding-left: 12px; font-size: 0.85rem; }
        .layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .panel { background: #15161f; border-radius: 20px; padding: 16px; flex: 1; min-width: 220px; border: 1px solid #2c2e3f; }
        .panel h3 { margin: 0 0 12px 0; font-size: 1.1rem; }
        .upload-area { border: 2px dashed #ff8c42; border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 16px; cursor: pointer; background: #101118; color: #ffbb77; font-weight: 500; transition: 0.2s; }
        .upload-area:hover { background: #1f2132; border-color: #ffaa55; }
        .pano-list { max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
        .pano-item { background: #202233; border-radius: 12px; padding: 8px 12px; cursor: grab; border: 1px solid #32344b; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; transition: 0.15s; }
        .pano-item:hover { background: #2a2c45; border-color: #ff8c42; }
        .pano-item:active { cursor: grabbing; }
        .pano-item.linked { border-color: #2ecc71; background: #1a2e24; }
        .pano-preview { width: 36px; height: 24px; border-radius: 4px; background-size: cover; background-position: center; flex-shrink: 0; border: 1px solid #3a3c58; }
        .pano-delete { margin-left: auto; background: none; border: none; color: #ff4757; cursor: pointer; font-size: 16px; padding: 0 4px; opacity: 0.6; transition: 0.2s; }
        .pano-delete:hover { opacity: 1; }
        .grid-container { background: #15161f; border-radius: 20px; padding: 16px; flex: 2.5; min-width: 400px; border: 1px solid #2c2e3f; }
        .grid-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; margin-bottom: 12px; }
        .grid-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 8px; border: 3px solid #333; background: #f5f5f0; pointer-events: none; }
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); pointer-events: auto; z-index: 10; }
        .cell-hitbox { pointer-events: auto; cursor: crosshair; position: relative; background: transparent; }
        .cell-hitbox.drop-target { outline: 3px dashed #ff8c42; outline-offset: -2px; background: rgba(255, 140, 66, 0.1); }
        .selected-highlight { outline: 3px solid #ff6600; outline-offset: -1px; animation: pulse 0.8s infinite; background: rgba(255, 102, 0, 0.15); }
        @keyframes pulse { 0%,100% { outline-color: #ff6600; } 50% { outline-color: #ff9933; } }
        
        .labels-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .labels-overlay.active {
            pointer-events: auto;
            z-index: 20;
        }
        .labels-overlay svg {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .labels-overlay.active svg {
            pointer-events: auto;
        }
        .labels-overlay svg text {
            pointer-events: auto;
            cursor: grab;
        }
        .labels-overlay svg text:active {
            cursor: grabbing;
        }
        
        .mode-toggle {
            background: #533483;
            color: white;
            margin-bottom: 10px;
        }
        .mode-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        .mode-badge.plan { background: #2ecc71; }
        .mode-badge.labels { background: #e94560; }
        
        .settings { background: #15161f; border-radius: 20px; padding: 16px; flex: 1; min-width: 220px; border: 1px solid #2c2e3f; }
        button { background: #ff8c42; border: none; color: #1e1f2c; font-weight: 600; padding: 10px; border-radius: 40px; cursor: pointer; font-size: 0.85rem; width: 100%; margin-top: 10px; transition: 0.15s; }
        button:hover { filter: brightness(1.1); }
        button.secondary { background: #2f324b; color: white; border: 1px solid #484b6e; }
        button.danger { background: #ff4757; color: white; }
        input, select { background: #202233; border: 1px solid #3a3c58; padding: 10px 12px; border-radius: 24px; color: #f0f3ff; width: 100%; margin-bottom: 12px; font-size: 0.9rem; }
        input:focus, select:focus { outline: none; border-color: #ff8c42; }
        .color-presets { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .color-preset { width: 26px; height: 26px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; transition: 0.15s; }
        .color-preset:hover { transform: scale(1.15); border-color: white; }
        hr { border-color: #2f3147; margin: 16px 0; }
        .room-info { background: #202233; padding: 10px; border-radius: 16px; margin-bottom: 12px; text-align: center; font-size: 0.9rem; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #ff8c42; color: #1e1f2c; padding: 8px 18px; border-radius: 40px; font-weight: bold; z-index: 9999; animation: toast 1.8s ease; white-space: nowrap; pointer-events: none; }
        @keyframes toast { 0% { opacity: 0; transform: translateX(-50%) translateY(10px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
        .hint { font-size: 11px; color: #7a7c9e; margin-top: 8px; text-align: center; line-height: 1.4; }
        .counter { display: inline-block; background: #ff8c42; color: #1e1f2c; border-radius: 10px; padding: 1px 7px; font-size: 10px; font-weight: bold; margin-left: 6px; }
        .progress-bar { width: 100%; height: 4px; background: #2f3147; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
        .progress-bar .fill { height: 100%; background: #2ecc71; border-radius: 2px; transition: width 0.3s; width: 0%; }
        .vr-badge { display: inline-block; background: #8b5cf6; color: white; border-radius: 8px; padding: 2px 8px; font-size: 10px; margin-left: 4px; }
        .label-controls { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
        .room-label:hover { filter: drop-shadow(0 0 6px #ff8c42); }
    </style>
</head>
<body>
<div class="app">
    <h1>🎯 Редактор туров 360° <span class="vr-badge">VR</span></h1>
    <div class="sub">
        <span id="modeStatus">🏠 Режим: редактирование плана</span>
        <span class="mode-badge plan" id="modeBadge">План</span>
    </div>
    <div class="layout">
        <div class="panel">
            <h3>📸 Панорамы <span class="counter" id="panoCount">0</span></h3>
            <div class="upload-area" id="uploadZone">📂 Загрузить JPG/PNG<br><span style="font-size:11px">или перетащите на план</span></div>
            <div class="pano-list" id="panoList"><div style="text-align:center;color:#5a5c7e;padding:20px;">✨ Нет панорам</div></div>
            <div class="hint">💡 Перетащите панораму на выделенную область</div>
        </div>
        <div class="grid-container">
            <h3>🗺️ План помещений <span class="counter" id="roomCount">0</span></h3>
            <button id="modeToggleBtn" class="mode-toggle">✏️ Режим редактирования надписей</button>
            <div class="grid-wrapper" id="gridWrapper">
                <svg class="grid-svg" id="gridSvg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"></svg>
                <div class="grid-overlay" id="gridOverlay"></div>
                <div class="labels-overlay" id="labelsOverlay">
                    <svg viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"></svg>
                </div>
            </div>
            <div style="display:flex;gap:8px; margin-top: 8px;">
                <button id="clearBtn" class="secondary">🧹 Сброс</button>
                <button id="deleteBtn" class="danger" style="display:none;">🗑️ Удалить</button>
                <button id="resetLabelsBtn" class="secondary">🏠 Сбросить все надписи</button>
            </div>
            <div class="hint" id="hintText">🖱️ Зажмите и тяните по сетке — выделение ячеек</div>
        </div>
        <div class="settings">
            <h3>⚙️ Комната</h3>
            <div class="room-info" id="roomInfo">Выберите комнату</div>
            <input type="text" id="roomName" placeholder="Название">
            <select id="roomPano"><option value="">— без панорамы —</option></select>
            <div style="margin-bottom:12px;font-size:0.8rem;color:#9ca3af;">🎨 Цвет заливки:</div>
            <div class="color-presets">
                <div class="color-preset" style="background:#e8dcc8" data-color="#e8dcc8"></div>
                <div class="color-preset" style="background:#d4e6f1" data-color="#d4e6f1"></div>
                <div class="color-preset" style="background:#d5f5e3" data-color="#d5f5e3"></div>
                <div class="color-preset" style="background:#fdebd0" data-color="#fdebd0"></div>
                <div class="color-preset" style="background:#e8daef" data-color="#e8daef"></div>
                <div class="color-preset" style="background:#fadbd8" data-color="#fadbd8"></div>
            </div>
            <input type="color" id="roomColor" value="#e8dcc8" style="height:34px;padding:2px;">
            <div class="label-controls" id="labelControls" style="display:none; margin-top: 8px;">
                <button id="resetLabelPosBtn" style="background:#555; font-size:11px; margin-top:0;">🔄 Сбросить позицию</button>
                <button id="resetLabelSizeBtn" style="background:#555; font-size:11px; margin-top:0;">📏 Сбросить размер</button>
            </div>
            <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
            <hr>
            <button id="exportBtn" style="background:#8b5cf6;font-size:1rem;">🥽 Скачать VR тур</button>
        </div>
    </div>
</div>

<script>
(function(){
    const GRID_SIZE = 10;
    const CELL_SIZE = 100;
    const SVG_NS = 'http://www.w3.org/2000/svg';
    
    // DOM элементы
    const gridSvg = document.getElementById('gridSvg');
    const gridOverlay = document.getElementById('gridOverlay');
    const labelsOverlay = document.getElementById('labelsOverlay');
    const labelsSvg = labelsOverlay.querySelector('svg');
    const modeToggleBtn = document.getElementById('modeToggleBtn');
    const modeStatus = document.getElementById('modeStatus');
    const modeBadge = document.getElementById('modeBadge');
    const hintText = document.getElementById('hintText');
    const panoListEl = document.getElementById('panoList');
    const roomNameEl = document.getElementById('roomName');
    const roomColorEl = document.getElementById('roomColor');
    const roomPanoEl = document.getElementById('roomPano');
    const roomInfoEl = document.getElementById('roomInfo');
    const deleteBtn = document.getElementById('deleteBtn');
    const clearBtn = document.getElementById('clearBtn');
    const exportBtn = document.getElementById('exportBtn');
    const resetLabelsBtn = document.getElementById('resetLabelsBtn');
    const resetLabelPosBtn = document.getElementById('resetLabelPosBtn');
    const resetLabelSizeBtn = document.getElementById('resetLabelSizeBtn');
    const labelControls = document.getElementById('labelControls');
    const panoCountEl = document.getElementById('panoCount');
    const roomCountEl = document.getElementById('roomCount');
    const uploadZone = document.getElementById('uploadZone');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    
    // Данные
    let cells = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
    let rooms = [];
    let nextId = 1;
    let selectedCells = [];
    let selectedRoomId = null;
    let panoramas = [];
    let labelData = new Map();
    
    // Состояния
    let isEditMode = false;
    let isDraggingCells = false;
    let dragStartRow = -1, dragStartCol = -1, dragEndRow = -1, dragEndCol = -1;
    let hasMoved = false;
    
    let svgRoomsGroup = null;
    let svgLabelsGroup = null;
    let svgSelectionRect = null;
    let cellHitboxes = [];
    
    function setMode(editMode) {
        isEditMode = editMode;
        if (isEditMode) {
            labelsOverlay.classList.add('active');
            modeToggleBtn.textContent = '🏠 Режим редактирования плана';
            modeToggleBtn.style.background = '#2ecc71';
            modeStatus.innerHTML = '✏️ Режим: редактирование надписей';
            modeBadge.className = 'mode-badge labels';
            modeBadge.textContent = 'Надписи';
            modeBadge.style.background = '#e94560';
            hintText.innerHTML = '🔤 Кликните на текст + перетащите — перемещение<br>🖱️ Колесико на тексте — изменение размера';
            if (svgSelectionRect) svgSelectionRect.style.display = 'none';
            selectedCells = [];
            updateSelectionDisplay();
        } else {
            labelsOverlay.classList.remove('active');
            modeToggleBtn.textContent = '✏️ Режим редактирования надписей';
            modeToggleBtn.style.background = '#533483';
            modeStatus.innerHTML = '🏠 Режим: редактирование плана';
            modeBadge.className = 'mode-badge plan';
            modeBadge.textContent = 'План';
            modeBadge.style.background = '#2ecc71';
            hintText.innerHTML = '🖱️ Зажмите и тяните по сетке — выделение ячеек<br>📸 Перетащите панораму на выделенную область';
            updateSelectionDisplay();
        }
    }
    
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function toast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 1800);
    }
    
    function darkenColor(hex, a = 0.35) {
        const n = parseInt(hex.replace('#', ''), 16);
        const r = Math.max(0, Math.floor(((n >> 16) & 0xFF) * (1 - a)));
        const g = Math.max(0, Math.floor(((n >> 8) & 0xFF) * (1 - a)));
        const b = Math.max(0, Math.floor((n & 0xFF) * (1 - a)));
        return `rgb(${r},${g},${b})`;
    }
    
    function getDefaultLabelPosition(cellsArr) {
        const rows = cellsArr.map(c => c.r);
        const cols = cellsArr.map(c => c.c);
        const minRow = Math.min(...rows);
        const maxRow = Math.max(...rows);
        const minCol = Math.min(...cols);
        const maxCol = Math.max(...cols);
        const centerX = (minCol + maxCol + 1) * CELL_SIZE / 2;
        const centerY = (minRow + maxRow + 1) * CELL_SIZE / 2;
        return { x: centerX, y: centerY };
    }
    
    function getLabelPosition(room) {
        const saved = labelData.get(room.id);
        if (saved && saved.x !== undefined && saved.y !== undefined) {
            return { x: saved.x, y: saved.y };
        }
        return getDefaultLabelPosition(room.cells);
    }
    
    function getLabelFontSize(room) {
        const saved = labelData.get(room.id);
        return (saved && saved.fontSize) ? saved.fontSize : 24;
    }
    
    function computeRoomPath(cellsArr) {
        if (!cellsArr.length) return '';
        const cellSet = new Set(cellsArr.map(c => `${c.r},${c.c}`));
        const edges = [];
        const dirs = [
            { dr: -1, dc: 0, s: 'top' },
            { dr: 0, dc: 1, s: 'right' },
            { dr: 1, dc: 0, s: 'bottom' },
            { dr: 0, dc: -1, s: 'left' }
        ];
        for (const { r, c } of cellsArr) {
            for (const { dr, dc, s } of dirs) {
                if (!cellSet.has(`${r+dr},${c+dc}`)) {
                    const x1 = c * CELL_SIZE;
                    const y1 = r * CELL_SIZE;
                    const x2 = (c+1) * CELL_SIZE;
                    const y2 = (r+1) * CELL_SIZE;
                    if (s === 'top') edges.push({ x1, y1, x2, y2: y1 });
                    else if (s === 'right') edges.push({ x1: x2, y1, x2, y2 });
                    else if (s === 'bottom') edges.push({ x1: x2, y1: y2, x2: x1, y2 });
                    else if (s === 'left') edges.push({ x1, y1: y2, x2: x1, y2: y1 });
                }
            }
        }
        if (!edges.length) return '';
        
        const pointMap = new Map();
        const pk = (x, y) => `${x.toFixed(4)},${y.toFixed(4)}`;
        for (const e of edges) {
            const k1 = pk(e.x1, e.y1), k2 = pk(e.x2, e.y2);
            if (!pointMap.has(k1)) pointMap.set(k1, []);
            if (!pointMap.has(k2)) pointMap.set(k2, []);
            pointMap.get(k1).push({ x: e.x2, y: e.y2 });
            pointMap.get(k2).push({ x: e.x1, y: e.y1 });
        }
        
        const visitedEdges = new Set();
        const ek = (x1, y1, x2, y2) => `${Math.min(x1,x2).toFixed(4)},${Math.min(y1,y2).toFixed(4)}-${Math.max(x1,x2).toFixed(4)},${Math.max(y1,y2).toFixed(4)}`;
        const polygons = [];
        
        for (const [startKey, nbrs] of pointMap) {
            const [sx, sy] = startKey.split(',').map(Number);
            for (const next of nbrs) {
                const key = ek(sx, sy, next.x, next.y);
                if (visitedEdges.has(key)) continue;
                const poly = [{ x: sx, y: sy }];
                let curr = next, prev = { x: sx, y: sy };
                visitedEdges.add(key);
                let closed = false, safety = 0;
                while (safety < edges.length * 2) {
                    poly.push(curr);
                    const nbrList = pointMap.get(pk(curr.x, curr.y)) || [];
                    let found = false;
                    for (const nxt of nbrList) {
                        const nk = ek(curr.x, curr.y, nxt.x, nxt.y);
                        if (!visitedEdges.has(nk) && !(Math.abs(nxt.x-prev.x)<0.001 && Math.abs(nxt.y-prev.y)<0.001)) {
                            visitedEdges.add(nk); prev = curr; curr = nxt; found = true; break;
                        }
                    }
                    if (!found) break;
                    if (Math.abs(curr.x-sx)<0.001 && Math.abs(curr.y-sy)<0.001) { closed = true; break; }
                    safety++;
                }
                if (closed && poly.length >= 4) polygons.push(poly);
            }
        }
        
        let pathD = '';
        for (const poly of polygons) {
            if (poly.length < 3) continue;
            let d = `M ${poly[0].x.toFixed(1)} ${poly[0].y.toFixed(1)}`;
            for (let i = 1; i < poly.length; i++) d += ` L ${poly[i].x.toFixed(1)} ${poly[i].y.toFixed(1)}`;
            d += ' Z'; pathD += d + ' ';
        }
        return pathD.trim();
    }
    
    function createDraggableLabel(room) {
        const text = document.createElementNS(SVG_NS, 'text');
        const pos = getLabelPosition(room);
        const fontSize = getLabelFontSize(room);
        
        text.setAttribute('x', pos.x);
        text.setAttribute('y', pos.y);
        text.setAttribute('font-size', fontSize);
        text.setAttribute('font-family', 'system-ui, sans-serif');
        text.setAttribute('font-weight', 'bold');
        text.setAttribute('fill', '#1f2937');
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'middle');
        text.classList.add('room-label');
        text.setAttribute('data-room-id', room.id);
        text.textContent = room.name;
        
        let isDragging = false;
        let startMouseX = 0, startMouseY = 0;
        let startLabelX = 0, startLabelY = 0;
        
        text.addEventListener('mousedown', (e) => {
            if (!isEditMode) return;
            e.stopPropagation();
            e.preventDefault();
            isDragging = true;
            startMouseX = e.clientX;
            startMouseY = e.clientY;
            startLabelX = parseFloat(text.getAttribute('x'));
            startLabelY = parseFloat(text.getAttribute('y'));
            text.style.filter = 'drop-shadow(0 0 6px #ff8c42)';
        });
        
        const onMouseMove = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            
            const svgRect = labelsSvg.getBoundingClientRect();
            const scaleX = 1000 / svgRect.width;
            const scaleY = 1000 / svgRect.height;
            
            const deltaX = (e.clientX - startMouseX) * scaleX;
            const deltaY = (e.clientY - startMouseY) * scaleY;
            
            let newX = startLabelX + deltaX;
            let newY = startLabelY + deltaY;
            newX = Math.max(30, Math.min(970, newX));
            newY = Math.max(30, Math.min(970, newY));
            
            text.setAttribute('x', newX);
            text.setAttribute('y', newY);
            
            const saved = labelData.get(room.id) || {};
            saved.x = newX;
            saved.y = newY;
            labelData.set(room.id, saved);
        };
        
        const onMouseUp = () => {
            if (isDragging) {
                isDragging = false;
                text.style.filter = '';
                if (selectedRoomId === room.id) {
                    resetLabelPosBtn.style.opacity = '1';
                }
            }
        };
        
        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
        
        text.addEventListener('wheel', (e) => {
            if (!isEditMode) return;
            e.stopPropagation();
            e.preventDefault();
            let currentSize = getLabelFontSize(room);
            let newSize = currentSize + (e.deltaY > 0 ? -2 : 2);
            newSize = Math.max(12, Math.min(48, newSize));
            if (newSize !== currentSize) {
                text.setAttribute('font-size', newSize);
                const saved = labelData.get(room.id) || {};
                saved.fontSize = newSize;
                labelData.set(room.id, saved);
                toast(`🔤 Размер: ${newSize}px`);
                if (selectedRoomId === room.id) {
                    resetLabelSizeBtn.style.opacity = '1';
                }
            }
        });
        
        return text;
    }
    
    function renderPlan() {
        if (svgRoomsGroup) {
            svgRoomsGroup.innerHTML = '';
            for (const room of rooms) {
                if (!room.cells.length) continue;
                const pathD = computeRoomPath(room.cells);
                if (pathD) {
                    const path = document.createElementNS(SVG_NS, 'path');
                    path.setAttribute('d', pathD);
                    path.setAttribute('fill', room.color);
                    path.setAttribute('stroke', darkenColor(room.color));
                    path.setAttribute('stroke-width', '3');
                    path.setAttribute('stroke-linejoin', 'round');
                    svgRoomsGroup.appendChild(path);
                }
            }
        }
        
        if (svgLabelsGroup) {
            svgLabelsGroup.innerHTML = '';
            for (const room of rooms) {
                if (!room.cells.length) continue;
                const label = createDraggableLabel(room);
                svgLabelsGroup.appendChild(label);
            }
        }
        
        roomCountEl.textContent = rooms.length;
        if (!isEditMode) updateSelectionDisplay();
    }
    
    function updateSelectionDisplay() {
        if (isEditMode) return;
        if (!cellHitboxes.length) return;
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                const isSel = selectedCells.some(sc => sc.r === r && sc.c === c);
                const div = cellHitboxes[r]?.[c];
                if (div) {
                    if (isSel) div.classList.add('selected-highlight');
                    else div.classList.remove('selected-highlight');
                }
            }
        }
        
        if (selectedCells.length > 0 && svgSelectionRect) {
            const rows = selectedCells.map(c => c.r);
            const cols = selectedCells.map(c => c.c);
            const minRow = Math.min(...rows);
            const maxRow = Math.max(...rows);
            const minCol = Math.min(...cols);
            const maxCol = Math.max(...cols);
            svgSelectionRect.setAttribute('x', minCol * CELL_SIZE);
            svgSelectionRect.setAttribute('y', minRow * CELL_SIZE);
            svgSelectionRect.setAttribute('width', (maxCol - minCol + 1) * CELL_SIZE);
            svgSelectionRect.setAttribute('height', (maxRow - minRow + 1) * CELL_SIZE);
            svgSelectionRect.style.display = '';
        } else if (svgSelectionRect) {
            svgSelectionRect.style.display = 'none';
        }
    }
    
    function initSvg() {
        gridSvg.innerHTML = '';
        
        const bg = document.createElementNS(SVG_NS, 'rect');
        bg.setAttribute('width', '1000');
        bg.setAttribute('height', '1000');
        bg.setAttribute('fill', '#fafaf5');
        bg.setAttribute('rx', '8');
        gridSvg.appendChild(bg);
        
        const gridGroup = document.createElementNS(SVG_NS, 'g');
        for (let i = 0; i <= GRID_SIZE; i++) {
            const hl = document.createElementNS(SVG_NS, 'line');
            hl.setAttribute('x1', '0'); hl.setAttribute('y1', i * CELL_SIZE);
            hl.setAttribute('x2', GRID_SIZE * CELL_SIZE); hl.setAttribute('y2', i * CELL_SIZE);
            hl.setAttribute('stroke', '#ddd'); hl.setAttribute('stroke-width', '1');
            gridGroup.appendChild(hl);
            const vl = document.createElementNS(SVG_NS, 'line');
            vl.setAttribute('x1', i * CELL_SIZE); vl.setAttribute('y1', '0');
            vl.setAttribute('x2', i * CELL_SIZE); vl.setAttribute('y2', GRID_SIZE * CELL_SIZE);
            vl.setAttribute('stroke', '#ddd'); vl.setAttribute('stroke-width', '1');
            gridGroup.appendChild(vl);
        }
        gridSvg.appendChild(gridGroup);
        
        svgRoomsGroup = document.createElementNS(SVG_NS, 'g');
        gridSvg.appendChild(svgRoomsGroup);
        
        svgSelectionRect = document.createElementNS(SVG_NS, 'rect');
        svgSelectionRect.setAttribute('fill', 'none');
        svgSelectionRect.setAttribute('stroke', '#ff6600');
        svgSelectionRect.setAttribute('stroke-width', '5');
        svgSelectionRect.setAttribute('stroke-dasharray', '12,6');
        svgSelectionRect.setAttribute('rx', '4');
        svgSelectionRect.style.display = 'none';
        gridSvg.appendChild(svgSelectionRect);
        
        labelsSvg.innerHTML = '';
        svgLabelsGroup = document.createElementNS(SVG_NS, 'g');
        labelsSvg.appendChild(svgLabelsGroup);
    }
    
    function getCellsInRect(r1, c1, r2, c2) {
        const rect = [];
        const minR = Math.min(r1, r2), maxR = Math.max(r1, r2);
        const minC = Math.min(c1, c2), maxC = Math.max(c1, c2);
        for (let r = minR; r <= maxR; r++) {
            for (let c = minC; c <= maxC; c++) {
                rect.push({ r, c });
            }
        }
        return rect;
    }
    
    function initHitboxes() {
        gridOverlay.innerHTML = '';
        cellHitboxes = [];
        
        for (let r = 0; r < GRID_SIZE; r++) {
            cellHitboxes[r] = [];
            for (let c = 0; c < GRID_SIZE; c++) {
                const div = document.createElement('div');
                div.className = 'cell-hitbox';
                div.dataset.row = r;
                div.dataset.col = c;
                gridOverlay.appendChild(div);
                cellHitboxes[r][c] = div;
                
                div.addEventListener('dragover', (e) => {
                    if (isEditMode) return;
                    e.preventDefault();
                    div.classList.add('drop-target');
                });
                div.addEventListener('dragleave', () => div.classList.remove('drop-target'));
                div.addEventListener('drop', (e) => {
                    if (isEditMode) return;
                    e.preventDefault();
                    div.classList.remove('drop-target');
                    const name = e.dataTransfer.getData('text/plain');
                    const pano = panoramas.find(p => p.name === name);
                    if (pano && selectedCells.length) {
                        createRoom(pano);
                    } else if (pano) {
                        toast('⚠️ Сначала выделите область');
                    }
                });
                
                div.addEventListener('mousedown', (e) => {
                    if (isEditMode) return;
                    if (e.button !== 0) return;
                    e.preventDefault();
                    e.stopPropagation();
                    isDraggingCells = true;
                    hasMoved = false;
                    dragStartRow = r;
                    dragStartCol = c;
                    dragEndRow = r;
                    dragEndCol = c;
                    if (e.shiftKey) {
                        const idx = selectedCells.findIndex(sc => sc.r === r && sc.c === c);
                        if (idx >= 0) selectedCells.splice(idx, 1);
                        else selectedCells.push({ r, c });
                        isDraggingCells = false;
                        updateSelectionDisplay();
                    } else {
                        selectedCells = [{ r, c }];
                        updateSelectionDisplay();
                    }
                });
                
                div.addEventListener('mouseenter', () => {
                    if (isEditMode) return;
                    if (!isDraggingCells) return;
                    const rr = parseInt(div.dataset.row);
                    const cc = parseInt(div.dataset.col);
                    if (dragEndRow !== rr || dragEndCol !== cc) {
                        dragEndRow = rr;
                        dragEndCol = cc;
                        hasMoved = true;
                        selectedCells = getCellsInRect(dragStartRow, dragStartCol, dragEndRow, dragEndCol);
                        updateSelectionDisplay();
                    }
                });
            }
        }
    }
    
    window.addEventListener('mouseup', () => {
        if (isDraggingCells) {
            isDraggingCells = false;
            if (!hasMoved && dragStartRow >= 0 && dragStartCol >= 0) {
                const roomId = cells[dragStartRow]?.[dragStartCol];
                if (roomId) selectRoom(roomId);
                else deselectRoom();
            }
            dragStartRow = dragStartCol = dragEndRow = dragEndCol = -1;
            hasMoved = false;
        }
    });
    
    function selectRoom(id) {
        selectedRoomId = id;
        const room = rooms.find(r => r.id === id);
        if (!room) return;
        roomNameEl.value = room.name;
        roomColorEl.value = room.color;
        roomPanoEl.value = room.panoFile || '';
        roomInfoEl.innerHTML = '🏠 <b>' + escapeHtml(room.name) + '</b> (' + room.cells.length + ' яч.)' + (room.panoFile ? ' 🎥' : '');
        deleteBtn.style.display = 'block';
        
        const saved = labelData.get(room.id) || {};
        resetLabelPosBtn.style.opacity = (saved.x !== undefined && saved.y !== undefined) ? '1' : '0.5';
        resetLabelSizeBtn.style.opacity = saved.fontSize !== undefined ? '1' : '0.5';
        labelControls.style.display = 'flex';
        
        selectedCells = [...room.cells];
        updateSelectionDisplay();
        setTimeout(() => {
            if (selectedRoomId === id && !isEditMode) {
                selectedCells = [];
                updateSelectionDisplay();
            }
        }, 600);
    }
    
    function deselectRoom() {
        selectedRoomId = null;
        deleteBtn.style.display = 'none';
        labelControls.style.display = 'none';
        roomInfoEl.innerHTML = 'Выберите комнату';
        roomNameEl.value = '';
        roomColorEl.value = '#e8dcc8';
        roomPanoEl.value = '';
        selectedCells = [];
        updateSelectionDisplay();
    }
    
    function createRoom(pano) {
        if (!selectedCells.length) return toast('⚠️ Выделите область');
        
        const occupied = selectedCells.filter(sc => cells[sc.r]?.[sc.c] !== null);
        if (occupied.length) {
            const names = [...new Set(occupied.map(sc => {
                const rm = rooms.find(r => r.id === cells[sc.r][sc.c]);
                return rm ? '"' + rm.name + '"' : '';
            }))].join(', ');
            if (!confirm('Перезаписать ' + occupied.length + ' ячеек из: ' + names + '?')) return;
        }
        
        const name = pano.name.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ').trim();
        const room = {
            id: nextId++,
            name: name || 'Комната ' + (nextId - 1),
            color: 'hsl(' + ((nextId * 47 + 15) % 360) + ', 35%, 85%)',
            panoFile: pano.name,
            panoDataUrl: pano.dataUrl,
            cells: [...selectedCells]
        };
        
        selectedCells.forEach(({ r, c }) => {
            const oldId = cells[r]?.[c];
            if (oldId) {
                const old = rooms.find(rm => rm.id === oldId);
                if (old) {
                    old.cells = old.cells.filter(cl => !(cl.r === r && cl.c === c));
                    if (!old.cells.length) {
                        rooms = rooms.filter(rm => rm.id !== oldId);
                    }
                }
            }
            cells[r][c] = room.id;
        });
        
        rooms.push(room);
        selectedRoomId = room.id;
        selectedCells = [];
        selectRoom(room.id);
        renderPlan();
        updatePanoPanel();
        toast('✅ "' + room.name + '" создана');
    }
    
    function deleteSelectedRoom() {
        if (!selectedRoomId) return toast('⚠️ Выберите комнату');
        const room = rooms.find(r => r.id === selectedRoomId);
        if (!room || !confirm('Удалить "' + room.name + '"?')) return;
        
        labelData.delete(room.id);
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                if (cells[r]?.[c] === selectedRoomId) cells[r][c] = null;
            }
        }
        rooms = rooms.filter(r => r.id !== selectedRoomId);
        deselectRoom();
        renderPlan();
        updatePanoPanel();
        toast('🗑️ Удалена');
    }
    
    function clearAll() {
        if (!confirm('Сбросить всё?')) return;
        labelData.clear();
        panoramas.forEach(p => {
            if (p.thumbnailUrl?.startsWith('blob:')) URL.revokeObjectURL(p.thumbnailUrl);
            if (p.dataUrl?.startsWith('blob:')) URL.revokeObjectURL(p.dataUrl);
        });
        cells = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(null));
        rooms = [];
        nextId = 1;
        panoramas = [];
        deselectRoom();
        renderPlan();
        updatePanoPanel();
        toast('🧹 Сброшено');
    }
    
    function resetLabelPosition() {
        if (!selectedRoomId) return;
        labelData.delete(selectedRoomId);
        renderPlan();
        toast('📍 Позиция надписи сброшена');
        resetLabelPosBtn.style.opacity = '0.5';
    }
    
    function resetLabelSize() {
        if (!selectedRoomId) return;
        const saved = labelData.get(selectedRoomId) || {};
        delete saved.fontSize;
        if (Object.keys(saved).length === 0) labelData.delete(selectedRoomId);
        else labelData.set(selectedRoomId, saved);
        renderPlan();
        toast('📏 Размер надписи сброшен');
        resetLabelSizeBtn.style.opacity = '0.5';
    }
    
    function resetAllLabels() {
        if (!confirm('Сбросить все надписи?')) return;
        labelData.clear();
        renderPlan();
        toast('🏠 Все надписи сброшены');
    }
    
    function saveRoomSettings() {
        if (!selectedRoomId) return;
        const room = rooms.find(r => r.id === selectedRoomId);
        if (!room) return;
        if (roomNameEl.value.trim()) room.name = roomNameEl.value.trim();
        room.color = roomColorEl.value;
        const pn = roomPanoEl.value;
        if (pn) {
            const p = panoramas.find(pp => pp.name === pn);
            if (p) {
                room.panoFile = p.name;
                room.panoDataUrl = p.dataUrl;
            }
        } else {
            room.panoFile = null;
            room.panoDataUrl = null;
        }
        renderPlan();
        updatePanoPanel();
        roomInfoEl.innerHTML = '🏠 <b>' + escapeHtml(room.name) + '</b> (' + room.cells.length + ' яч.)' + (room.panoFile ? ' 🎥' : '');
        toast('💾 Сохранено');
    }
    
    let saveTimeout = null;
    function debouncedSave() {
        if (saveTimeout) clearTimeout(saveTimeout);
        saveTimeout = setTimeout(saveRoomSettings, 300);
    }
    
    function updatePanoPanel() {
        panoListEl.innerHTML = '';
        if (!panoramas.length) {
            panoListEl.innerHTML = '<div style="text-align:center;color:#5a5c7e;padding:20px;">✨ Нет панорам</div>';
            panoCountEl.textContent = '0';
        } else {
            panoCountEl.textContent = panoramas.length;
            panoramas.forEach(p => {
                const linked = rooms.find(r => r.panoFile === p.name);
                const div = document.createElement('div');
                div.className = 'pano-item';
                if (linked) div.classList.add('linked');
                div.draggable = true;
                const previewUrl = p.thumbnailUrl || p.dataUrl;
                div.innerHTML = `<div class="pano-preview" style="background-image:url('${previewUrl}')"></div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.8rem;">${escapeHtml(p.name)}${linked ? ' 🔗' + escapeHtml(linked.name) : ''}</span><span class="pano-delete">×</span>`;
                div.querySelector('.pano-delete').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deletePanorama(p.name);
                });
                div.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', p.name);
                    div.style.opacity = '0.5';
                });
                div.addEventListener('dragend', () => div.style.opacity = '1');
                div.addEventListener('click', () => {
                    if (selectedRoomId) {
                        const room = rooms.find(r => r.id === selectedRoomId);
                        if (room) {
                            room.panoFile = p.name;
                            room.panoDataUrl = p.dataUrl;
                            selectRoom(selectedRoomId);
                            renderPlan();
                        }
                    } else if (selectedCells.length && !isEditMode) {
                        createRoom(p);
                    } else if (!selectedCells.length) {
                        toast('⚠️ Выделите область');
                    } else if (isEditMode) {
                        toast('⚠️ Выйдите из режима редактирования надписей');
                    }
                });
                panoListEl.appendChild(div);
            });
        }
        const curVal = roomPanoEl.value;
        roomPanoEl.innerHTML = '<option value="">— без панорамы —</option>';
        panoramas.forEach(p => {
            const o = document.createElement('option');
            o.value = p.name;
            o.textContent = p.name.substring(0, 35);
            roomPanoEl.appendChild(o);
        });
        roomPanoEl.value = curVal;
    }
    
    async function createThumbnail(dataUrl, w, h) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas');
                c.width = w;
                c.height = h;
                const ctx = c.getContext('2d');
                if (!ctx) return reject(new Error('Canvas'));
                ctx.drawImage(img, 0, 0, w, h);
                c.toBlob(blob => blob ? resolve(URL.createObjectURL(blob)) : reject(new Error('Blob')), 'image/jpeg', 0.7);
            };
            img.onerror = () => reject(new Error('Load'));
            img.src = dataUrl;
        });
    }
    
    async function addPanorama(file, url) {
        if (file.size > 100 * 1024 * 1024) return toast('❌ Файл слишком большой (>100MB)');
        let name = file.name, n = 1;
        while (panoramas.some(p => p.name === name)) {
            const dot = name.lastIndexOf('.');
            name = name.slice(0, dot) + ' (' + n + ')' + name.slice(dot);
            n++;
        }
        let thumbnailUrl = url;
        if (file.size > 100 * 1024) {
            try { thumbnailUrl = await createThumbnail(url, 72, 48); } catch(e) {}
        }
        panoramas.push({ name, file, dataUrl: url, thumbnailUrl });
        updatePanoPanel();
        toast('📸 "' + name + '"');
    }
    
    function deletePanorama(name) {
        const used = rooms.filter(r => r.panoFile === name);
        if (used.length && !confirm('Используется в: ' + used.map(r => r.name).join(', ') + '. Удалить?')) return;
        used.forEach(r => {
            r.panoFile = null;
            r.panoDataUrl = null;
        });
        const pd = panoramas.find(p => p.name === name);
        if (pd) {
            if (pd.thumbnailUrl?.startsWith('blob:')) URL.revokeObjectURL(pd.thumbnailUrl);
            if (pd.dataUrl?.startsWith('blob:')) URL.revokeObjectURL(pd.dataUrl);
        }
        panoramas = panoramas.filter(p => p.name !== name);
        if (selectedRoomId) selectRoom(selectedRoomId);
        renderPlan();
        updatePanoPanel();
        toast('🗑️ Панорама удалена');
    }
    
    // ========== ФУНКЦИИ ДЛЯ ЭКСПОРТА ==========
    
    // Вычисление контура комнаты для экспорта
    function computeRoomPathForExport(cellsArr, cellSz, pad) {
        if (!cellsArr.length) return '';
        const cellSet = new Set(cellsArr.map(c => `${c.r},${c.c}`));
        const edges = [];
        const dirs = [
            { dr: -1, dc: 0, s: 'top' },
            { dr: 0, dc: 1, s: 'right' },
            { dr: 1, dc: 0, s: 'bottom' },
            { dr: 0, dc: -1, s: 'left' }
        ];
        for (const { r, c } of cellsArr) {
            for (const { dr, dc, s } of dirs) {
                if (!cellSet.has(`${r+dr},${c+dc}`)) {
                    const x1 = pad + c * cellSz;
                    const y1 = pad + r * cellSz;
                    const x2 = pad + (c+1) * cellSz;
                    const y2 = pad + (r+1) * cellSz;
                    if (s === 'top') edges.push({ x1, y1, x2, y2: y1 });
                    else if (s === 'right') edges.push({ x1: x2, y1, x2, y2 });
                    else if (s === 'bottom') edges.push({ x1: x2, y1: y2, x2: x1, y2 });
                    else if (s === 'left') edges.push({ x1, y1: y2, x2: x1, y2: y1 });
                }
            }
        }
        if (!edges.length) return '';
        
        const pointMap = new Map();
        const pk = (x, y) => `${x.toFixed(4)},${y.toFixed(4)}`;
        for (const e of edges) {
            const k1 = pk(e.x1, e.y1), k2 = pk(e.x2, e.y2);
            if (!pointMap.has(k1)) pointMap.set(k1, []);
            if (!pointMap.has(k2)) pointMap.set(k2, []);
            pointMap.get(k1).push({ x: e.x2, y: e.y2 });
            pointMap.get(k2).push({ x: e.x1, y: e.y1 });
        }
        
        const visitedEdges = new Set();
        const ek = (x1, y1, x2, y2) => `${Math.min(x1,x2).toFixed(4)},${Math.min(y1,y2).toFixed(4)}-${Math.max(x1,x2).toFixed(4)},${Math.max(y1,y2).toFixed(4)}`;
        const polygons = [];
        
        for (const [startKey, nbrs] of pointMap) {
            const [sx, sy] = startKey.split(',').map(Number);
            for (const next of nbrs) {
                const key = ek(sx, sy, next.x, next.y);
                if (visitedEdges.has(key)) continue;
                const poly = [{ x: sx, y: sy }];
                let curr = next, prev = { x: sx, y: sy };
                visitedEdges.add(key);
                let closed = false, safety = 0;
                while (safety < edges.length * 2) {
                    poly.push(curr);
                    const nbrList = pointMap.get(pk(curr.x, curr.y)) || [];
                    let found = false;
                    for (const nxt of nbrList) {
                        const nk = ek(curr.x, curr.y, nxt.x, nxt.y);
                        if (!visitedEdges.has(nk) && !(Math.abs(nxt.x-prev.x)<0.001 && Math.abs(nxt.y-prev.y)<0.001)) {
                            visitedEdges.add(nk); prev = curr; curr = nxt; found = true; break;
                        }
                    }
                    if (!found) break;
                    if (Math.abs(curr.x-sx)<0.001 && Math.abs(curr.y-sy)<0.001) { closed = true; break; }
                    safety++;
                }
                if (closed && poly.length >= 4) polygons.push(poly);
            }
        }
        
        let pathD = '';
        for (const poly of polygons) {
            if (poly.length < 3) continue;
            let d = `M ${poly[0].x.toFixed(1)} ${poly[0].y.toFixed(1)}`;
            for (let i = 1; i < poly.length; i++) d += ` L ${poly[i].x.toFixed(1)} ${poly[i].y.toFixed(1)}`;
            d += ' Z'; pathD += d + ' ';
        }
        return pathD.trim();
    }
    
    // Получение дефолтной позиции надписи для экспорта
    function getDefaultLabelPositionForExport(cellsArr, cellSz, pad) {
        const rows = cellsArr.map(c => c.r);
        const cols = cellsArr.map(c => c.c);
        const minRow = Math.min(...rows);
        const maxRow = Math.max(...rows);
        const minCol = Math.min(...cols);
        const maxCol = Math.max(...cols);
        const bw = (maxCol - minCol + 1) * cellSz;
        const bh = (maxRow - minRow + 1) * cellSz;
        const centerX = pad + (minCol + maxCol + 1) * cellSz / 2;
        const centerY = pad + (minRow + maxRow + 1) * cellSz / 2;
        return { x: centerX, y: centerY, bw, bh };
    }
    
    // Получение позиции надписи с учётом масштабирования
    function getLabelPositionForExport(room, defaultPos, svgW, svgH, pad) {
        const saved = labelData.get(room.id);
        if (saved && saved.x !== undefined && saved.y !== undefined) {
            // Масштабируем координаты из 1000x1000 в размер экспортной SVG
            const scaleX = (svgW - pad * 2) / 1000;
            const scaleY = (svgH - pad * 2) / 1000;
            let x = pad + saved.x * scaleX;
            let y = pad + saved.y * scaleY;
            // Ограничиваем отступами
            x = Math.max(pad + 5, Math.min(svgW - pad - 5, x));
            y = Math.max(pad + 5, Math.min(svgH - pad - 5, y));
            return { x, y };
        }
        return defaultPos;
    }
    
    // Получение размера шрифта для экспорта
    function getLabelFontSizeForExport(room, defaultSize) {
        const saved = labelData.get(room.id);
        if (saved && saved.fontSize) {
            // Масштабируем размер шрифта пропорционально
            return Math.max(10, Math.min(28, saved.fontSize * 0.6));
        }
        return Math.max(10, Math.min(24, defaultSize));
    }
    
    function convertToWebP(dataUrl, quality = 0.75) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                let w = img.width, h = img.height;
                if (w > 4096 || h > 2048) {
                    const r = Math.min(4096/w, 2048/h);
                    w = Math.round(w * r);
                    h = Math.round(h * r);
                }
                const c = document.createElement('canvas');
                c.width = w;
                c.height = h;
                const ctx = c.getContext('2d');
                if (!ctx) return reject(new Error('Canvas'));
                ctx.drawImage(img, 0, 0, w, h);
                c.toBlob(blob => {
                    if (!blob) return reject(new Error('WebP'));
                    const reader = new FileReader();
                    reader.onload = () => resolve({ dataUrl: reader.result, size: blob.size, width: w, height: h });
                    reader.onerror = () => reject(new Error('Reader'));
                    reader.readAsDataURL(blob);
                }, 'image/webp', quality);
            };
            img.onerror = () => reject(new Error('Load'));
            img.src = dataUrl;
        });
    }
    
    async function exportTour() {
        const withPano = rooms.filter(r => r.panoDataUrl && r.cells.length);
        if (!withPano.length) return toast('⚠️ Привяжите панорамы к комнатам');
        
        exportBtn.disabled = true;
        exportBtn.textContent = '⏳ Конвертация...';
        progressBar.style.display = 'block';
        progressFill.style.width = '0%';
        
        try {
            // Конвертация панорам в WebP
            const BATCH_SIZE = 2;
            const converted = [];
            
            for (let i = 0; i < withPano.length; i += BATCH_SIZE) {
                const batch = withPano.slice(i, i + BATCH_SIZE);
                const batchPromises = batch.map(async (room) => {
                    try {
                        if (!room.panoDataUrl?.startsWith('data:')) return null;
                        const result = await convertToWebP(room.panoDataUrl, 0.75);
                        return { 
                            id: room.id, 
                            name: room.name, 
                            dataUrl: result.dataUrl, 
                            width: result.width, 
                            height: result.height 
                        };
                    } catch(e) {
                        return { 
                            id: room.id, 
                            name: room.name, 
                            dataUrl: room.panoDataUrl, 
                            width: 2048, 
                            height: 1024 
                        };
                    }
                });
                const batchResults = await Promise.all(batchPromises);
                for (const res of batchResults) if (res) converted.push(res);
                progressFill.style.width = Math.round(((i + batch.length) / withPano.length) * 50) + '%';
                await new Promise(r => setTimeout(r, 10));
            }
            
            if (!converted.length) throw new Error('Нет валидных панорам');
            
            progressFill.style.width = '60%';
            await new Promise(r => setTimeout(r, 0));
            
            // Параметры мини-карты
            const cellSz = 28;
            const pad = 12;
            const svgW = GRID_SIZE * cellSz + pad * 2;
            const svgH = GRID_SIZE * cellSz + pad * 2;
            
            let shapesSvg = '';
            
            for (const room of rooms) {
                if (!room.cells.length) continue;
                
                // Контур комнаты
                const pathD = computeRoomPathForExport(room.cells, cellSz, pad);
                if (pathD) {
                    shapesSvg += `<path d="${pathD}" fill="${room.color}" stroke="${darkenColor(room.color)}" stroke-width="1.5" stroke-linejoin="round" class="room-shape" data-room="${room.id}"/>`;
                }
                
                // Позиция надписи
                const defaultPos = getDefaultLabelPositionForExport(room.cells, cellSz, pad);
                const labelPos = getLabelPositionForExport(room, defaultPos, svgW, svgH, pad);
                const defaultFontSize = Math.max(8, Math.min(defaultPos.bw, defaultPos.bh) * 0.12);
                const fontSize = getLabelFontSizeForExport(room, defaultFontSize);
                
                shapesSvg += `<text x="${labelPos.x}" y="${labelPos.y}" text-anchor="middle" dominant-baseline="central" font-size="${fontSize}" font-weight="600" fill="#1f2937" font-family="system-ui,sans-serif" data-room-id="${room.id}">${escapeHtml(room.name)}</text>`;
            }
            
            const svgString = `<svg xmlns="${SVG_NS}" viewBox="0 0 ${svgW} ${svgH}" width="100%" height="100%"><rect width="${svgW}" height="${svgH}" fill="#fafaf5" rx="10"/>${shapesSvg}</svg>`;
            const encoder = new TextEncoder();
            const bytes = encoder.encode(svgString);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            const svgBase64 = btoa(binary);
            
            progressFill.style.width = '80%';
            await new Promise(r => setTimeout(r, 0));
            
            const roomsJson = JSON.stringify(converted);
            
            // Сохраняем кастомные настройки надписей (только координаты и размер)
            const labelOverridesExport = {};
            for (const [id, data] of labelData.entries()) {
                if (rooms.find(r => r.id === id)) {
                    const exportData = {};
                    if (data.x !== undefined && data.y !== undefined && data.x > 0 && data.x < 1000 && data.y > 0 && data.y < 1000) {
                        // Координаты будут применены в VR HTML с масштабированием
                        exportData.x = data.x;
                        exportData.y = data.y;
                    }
                    if (data.fontSize) {
                        exportData.fontSize = data.fontSize;
                    }
                    if (Object.keys(exportData).length > 0) {
                        labelOverridesExport[id] = exportData;
                    }
                }
            }
            
            const html = generateVRHtml(roomsJson, svgBase64, labelOverridesExport, svgW, svgH, pad);
            
            progressFill.style.width = '100%';
            await new Promise(r => setTimeout(r, 100));
            
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const downloadUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = 'vr_tour_360.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(downloadUrl), 2000);
            
            progressBar.style.display = 'none';
            progressFill.style.width = '0%';
            exportBtn.disabled = false;
            exportBtn.textContent = '🥽 Скачать VR тур';
            toast('✅ VR тур готов! ' + (blob.size / 1024 / 1024).toFixed(1) + ' MB');
            
        } catch(e) {
            progressBar.style.display = 'none';
            progressFill.style.width = '0%';
            exportBtn.disabled = false;
            exportBtn.textContent = '🥽 Скачать VR тур';
            console.error(e);
            toast('❌ Ошибка: ' + e.message);
        }
    }
    
    function generateVRHtml(roomsJson, svgBase64, labelOverridesExport, svgW, svgH, pad) {
        return `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Тур 360</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.min.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: system-ui, sans-serif; background: #000; }
        #viewer { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        #plan-wrap {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 10px;
            width: 200px;
            height: 200px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: opacity 0.3s;
            cursor: pointer;
        }
        #plan-wrap svg { width: 100%; height: 100%; }
        #plan-wrap.hidden { opacity: 0.2; }
        .room-shape { cursor: pointer; transition: filter 0.3s; }
        .room-shape:hover { filter: brightness(0.85); }
        .room-shape.active { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { filter: brightness(0.9); } 50% { filter: brightness(1.15); } }
        .lbl {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .lbl.hidden { opacity: 0.15; }
        @media (max-width: 600px) {
            #plan-wrap { width: 150px; height: 150px; bottom: 8px; right: 8px; }
            .lbl { font-size: 12px; padding: 6px 16px; }
        }
    </style>
</head>
<body>
<div id="viewer"></div>
<div class="lbl" id="lbl">Загрузка...</div>
<div id="plan-wrap"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.min.js",
        "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.module.min.js"
    }
}
<\/script>

<script type="module">
import { Viewer } from '@photo-sphere-viewer/core';

const ROOMS = ${roomsJson};
const LABEL_OVERRIDES = ${JSON.stringify(labelOverridesExport)};
const SVG_W = ${svgW};
const SVG_H = ${svgH};
const PAD = ${pad};

if (!ROOMS || !ROOMS.length) {
    document.getElementById('lbl').textContent = 'Нет панорам';
}

let current = ROOMS[0];
let viewer = null;

const svgBase64 = "${svgBase64}";
try {
    const binaryStr = atob(svgBase64);
    const bytes = new Uint8Array(binaryStr.length);
    for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
    document.getElementById('plan-wrap').innerHTML = new TextDecoder().decode(bytes);
    
    // Применяем кастомные позиции надписей с масштабированием
    if (LABEL_OVERRIDES) {
        setTimeout(() => {
            // Размеры SVG в экспорте
            const svgRect = { width: SVG_W, height: SVG_H };
            const visibleWidth = svgRect.width - PAD * 2;
            const visibleHeight = svgRect.height - PAD * 2;
            
            for (const [roomId, override] of Object.entries(LABEL_OVERRIDES)) {
                const textEl = document.querySelector('#plan-wrap text[data-room-id="' + roomId + '"]');
                if (textEl) {
                    if (override.x !== undefined && override.y !== undefined) {
                        // Масштабируем координаты из 1000x1000 в размер SVG
                        const scaleX = visibleWidth / 1000;
                        const scaleY = visibleHeight / 1000;
                        let newX = PAD + override.x * scaleX;
                        let newY = PAD + override.y * scaleY;
                        newX = Math.max(PAD + 5, Math.min(svgRect.width - PAD - 5, newX));
                        newY = Math.max(PAD + 5, Math.min(svgRect.height - PAD - 5, newY));
                        textEl.setAttribute('x', newX);
                        textEl.setAttribute('y', newY);
                    }
                    if (override.fontSize) {
                        // Масштабируем размер шрифта
                        let newSize = Math.max(10, Math.min(28, override.fontSize * 0.6));
                        textEl.setAttribute('font-size', newSize);
                    }
                }
            }
        }, 100);
    }
} catch(e) { console.warn(e); }

function initViewer(room) {
    if (viewer) {
        try { viewer.destroy(); } catch(e) {}
    }
    
    viewer = new Viewer({
        container: document.getElementById('viewer'),
        panorama: room.dataUrl,
        navbar: ['zoom', 'fullscreen', 'caption', 'gyroscope', 'vr'],
        caption: room.name,
        defaultZoomLvl: 0,
        minFov: 30,
        maxFov: 110,
        mousewheel: true,
        moveSpeed: 1.5,
        zoomSpeed: 1.2
    });
    
    viewer.addEventListener('ready', () => {
        document.getElementById('lbl').textContent = '📍 ' + current.name;
        updateActiveShape();
    });
    
    viewer.addEventListener('fullscreen', (e) => {
        const plan = document.getElementById('plan-wrap');
        const lbl = document.getElementById('lbl');
        if (e.fullscreen) {
            plan.classList.add('hidden');
            lbl.classList.add('hidden');
        } else {
            plan.classList.remove('hidden');
            lbl.classList.remove('hidden');
        }
    });
}

function updateActiveShape() {
    const shapes = document.querySelectorAll('.room-shape');
    shapes.forEach(shape => {
        if (parseInt(shape.getAttribute('data-room')) === current.id) {
            shape.classList.add('active');
        } else {
            shape.classList.remove('active');
        }
    });
}

function switchRoom(room) {
    if (!room || room.id === current.id) return;
    current = room;
    document.getElementById('lbl').textContent = '⏳ ' + room.name;
    try {
        viewer.setPanorama(room.dataUrl, { caption: room.name, transition: true });
    } catch(e) {
        initViewer(room);
    }
}

setTimeout(() => {
    initViewer(ROOMS[0]);
    
    setTimeout(() => {
        const shapes = document.querySelectorAll('.room-shape');
        shapes.forEach(shape => {
            shape.addEventListener('click', function() {
                const id = parseInt(this.getAttribute('data-room'));
                const room = ROOMS.find(r => r.id === id);
                if (room) switchRoom(room);
            });
        });
    }, 300);
    
    document.addEventListener('keydown', (e) => {
        if (!ROOMS.length) return;
        let idx = ROOMS.findIndex(r => r.id === current.id);
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
            e.preventDefault();
            switchRoom(ROOMS[(idx + 1) % ROOMS.length]);
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            e.preventDefault();
            switchRoom(ROOMS[(idx - 1 + ROOMS.length) % ROOMS.length]);
        }
    });
}, 200);
<\/script>
</body>
</html>`;
    }
    
    function initApp() {
        initSvg();
        initHitboxes();
        setMode(false);
        deselectRoom();
        renderPlan();
        updatePanoPanel();
    }
    
    // Event Listeners
    modeToggleBtn.addEventListener('click', () => setMode(!isEditMode));
    exportBtn.addEventListener('click', exportTour);
    clearBtn.addEventListener('click', clearAll);
    deleteBtn.addEventListener('click', deleteSelectedRoom);
    resetLabelsBtn.addEventListener('click', resetAllLabels);
    resetLabelPosBtn.addEventListener('click', resetLabelPosition);
    resetLabelSizeBtn.addEventListener('click', resetLabelSize);
    roomNameEl.addEventListener('input', debouncedSave);
    roomColorEl.addEventListener('input', debouncedSave);
    roomPanoEl.addEventListener('change', saveRoomSettings);
    
    document.querySelectorAll('.color-preset').forEach(el => {
        el.addEventListener('click', () => {
            roomColorEl.value = el.dataset.color;
            saveRoomSettings();
        });
    });
    
    uploadZone.addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'image/jpeg,image/png';
        inp.multiple = true;
        inp.onchange = () => {
            [...inp.files].forEach(f => {
                const r = new FileReader();
                r.onload = e => addPanorama(f, e.target.result);
                r.readAsDataURL(f);
            });
        };
        inp.click();
    });
    
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.style.borderColor = '#fa3'; });
    uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor = '#ff8c42'; });
    uploadZone.addEventListener('drop', e => {
        e.preventDefault();
        uploadZone.style.borderColor = '#ff8c42';
        [...e.dataTransfer.files].filter(f => f.type.startsWith('image/')).forEach(f => {
            const r = new FileReader();
            r.onload = ev => addPanorama(f, ev.target.result);
            r.readAsDataURL(f);
        });
    });
    
    gridWrapper.addEventListener('dragover', e => e.preventDefault());
    gridWrapper.addEventListener('drop', e => {
        e.preventDefault();
        if (isEditMode) {
            toast('⚠️ Выйдите из режима редактирования надписей');
            return;
        }
        const name = e.dataTransfer.getData('text/plain');
        const pano = panoramas.find(p => p.name === name);
        if (pano && selectedCells.length) createRoom(pano);
        else if (pano) toast('⚠️ Сначала выделите область');
    });
    
    initApp();
    console.log('✅ Редактор готов — переключение режимов, редактирование комнат, перетаскивание надписей');
})();
</script>
</body>
</html>
