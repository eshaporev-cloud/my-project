<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тест гироскопа PSV 5.11.0 - Исправленный</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #viewer { width: 100%; height: 100%; }
        #status {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #ff8c42;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="status">Загрузка...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.min.js",
                "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.11.0/index.module.min.js",
                "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5.11.0/index.module.min.js"
            }
        }
    </script>

    <script type="module">
        import { Viewer } from '@photo-sphere-viewer/core';
        import { GyroscopePlugin } from '@photo-sphere-viewer/gyroscope-plugin';
        
        const statusDiv = document.getElementById('status');
        
        // Отладка гироскопа
        window.addEventListener('deviceorientation', (e) => {
            console.log(`α:${Math.round(e.alpha)} β:${Math.round(e.beta)} γ:${Math.round(e.gamma)}`);
            statusDiv.textContent = `🎯 α:${Math.round(e.alpha)} β:${Math.round(e.beta)} γ:${Math.round(e.gamma)}`;
        });
        
        const viewer = new Viewer({
            container: 'viewer',
            panorama: 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg',
            navbar: ['zoom', 'fullscreen', 'caption'],
            caption: 'Тест гироскопа - PSV 5.11.0',
            plugins: [
                [GyroscopePlugin, {
                    absolutePosition: true,  // абсолютное позиционирование
                    moveMode: 'fast',        // быстрый режим для Android
                    touchmove: false         // ← КЛЮЧЕВОЙ ПАРАМЕТР — отключаем ручное управление
                }]
            ]
        });
        
        viewer.addEventListener('ready', () => {
            statusDiv.textContent = '✅ Готово! Поворачивай телефон';
            console.log('Viewer готов, гироскоп активирован');
        });
    </script>
</body>
</html>
