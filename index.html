<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PSV 5.7.4 - Гироскоп как в Google Фото</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.7.4/index.min.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        #viewer {
            width: 100%;
            height: 100%;
        }
        
        /* Кнопка гироскопа в стиле Google Фото */
        .gyro-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border: none;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .gyro-btn:active {
            transform: scale(0.92);
        }
        /* Иконка телефона */
        .gyro-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: white;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        /* Активное состояние (гироскоп включён) */
        .gyro-btn.active {
            background: #ff8c42;
            box-shadow: 0 0 16px rgba(255,140,66,0.5);
        }
        .gyro-btn.active svg {
            stroke: #1e1f2c;
        }
        
        /* Маленький статус (незаметный, как в Google Фото) */
        .gyro-status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-family: system-ui, sans-serif;
            color: rgba(255,255,255,0.6);
            z-index: 1000;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        /* В полноэкранном режиме кнопка остаётся на месте */
        #viewer:fullscreen .gyro-btn,
        #viewer:-webkit-full-screen .gyro-btn {
            bottom: 20px;
            right: 20px;
        }
        
        @media (max-width: 600px) {
            .gyro-btn { width: 44px; height: 44px; bottom: 16px; right: 16px; }
            .gyro-btn svg { width: 22px; height: 22px; }
            .gyro-status { bottom: 16px; left: 16px; font-size: 9px; }
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div class="gyro-status" id="gyroStatus">🟢 Гироскоп выключен</div>
    <button class="gyro-btn" id="gyroBtn">
        <svg viewBox="0 0 24 24">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2" stroke="currentColor" fill="none"/>
            <line x1="12" y1="18" x2="12" y2="18" stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="18" r="1" fill="currentColor"/>
            <!-- волны сигнала -->
            <path d="M8 10 Q12 6 16 10" stroke="currentColor" fill="none"/>
            <path d="M6 13 Q12 8 18 13" stroke="currentColor" fill="none" opacity="0.6"/>
        </svg>
    </button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.min.js",
                "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.7.4/index.module.min.js",
                "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5.7.4/index.module.min.js"
            }
        }
    </script>

    <script type="module">
        import { Viewer } from '@photo-sphere-viewer/core';
        import { GyroscopePlugin } from '@photo-sphere-viewer/gyroscope-plugin';
        
        const statusDiv = document.getElementById('gyroStatus');
        const gyroBtn = document.getElementById('gyroBtn');
        
        let viewer = null;
        let gyroPlugin = null;
        let gyroActive = false;
        let isReady = false;
        
        // Функция обновления UI (лаконично)
        function updateUI() {
            if (gyroActive) {
                gyroBtn.classList.add('active');
                statusDiv.innerHTML = '🟢 Гироскоп активен';
                statusDiv.style.color = '#ff8c42';
            } else {
                gyroBtn.classList.remove('active');
                statusDiv.innerHTML = '⚪ Гироскоп выключен';
                statusDiv.style.color = 'rgba(255,255,255,0.5)';
            }
        }
        
        // Перезапуск гироскопа после касаний
        function restartGyroscope() {
            if (!gyroPlugin || !gyroActive || !isReady) return;
            try {
                gyroPlugin.stop();
                setTimeout(() => {
                    if (gyroActive) gyroPlugin.start();
                }, 10);
            } catch(e) {}
        }
        
        // Включение гироскопа
        function enableGyroscope() {
            if (!gyroPlugin || gyroActive) return;
            try {
                gyroPlugin.start();
                gyroActive = true;
                updateUI();
                console.log('✅ Гироскоп включен');
            } catch(e) { console.error(e); }
        }
        
        // Выключение гироскопа
        function disableGyroscope() {
            if (!gyroPlugin || !gyroActive) return;
            try {
                gyroPlugin.stop();
                gyroActive = false;
                updateUI();
                console.log('⭕ Гироскоп выключен');
            } catch(e) { console.error(e); }
        }
        
        // Toggle кнопки
        function toggleGyroscope() {
            if (!isReady) return;
            if (gyroActive) {
                disableGyroscope();
            } else {
                enableGyroscope();
            }
        }
        
        // Обработчик касаний — перезапуск гироскопа
        function onTouchStart(e) {
            // Не реагируем на касания самой кнопки
            if (e.target.closest('.gyro-btn')) return;
            if (gyroActive && isReady) {
                restartGyroscope();
            }
        }
        
        // Инициализация просмотрщика
        viewer = new Viewer({
            container: 'viewer',
            panorama: 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg',
            navbar: ['zoom', 'fullscreen', 'caption'],
            caption: ' ',
            plugins: [
                [GyroscopePlugin, {
                    absolutePosition: true,
                    touchmove: false,
                    moveMode: 'fast'
                }]
            ]
        });
        
        viewer.addEventListener('ready', () => {
            isReady = true;
            gyroPlugin = viewer.getPlugin(GyroscopePlugin);
            
            if (gyroPlugin) {
                statusDiv.innerHTML = '⚪ Нажмите на кнопку';
                console.log('✅ Плагин гироскопа найден');
                
                // Обработчики
                gyroBtn.addEventListener('click', toggleGyroscope);
                document.body.addEventListener('touchstart', onTouchStart, { passive: false });
                document.body.addEventListener('mousedown', onTouchStart);
                
                // Автоматически включаем гироскоп? Нет, ждём нажатия
            } else {
                statusDiv.innerHTML = '❌ Ошибка';
                gyroBtn.style.opacity = '0.5';
            }
        });
        
        // Показываем значения в статусе (необязательно, но полезно)
        window.addEventListener('deviceorientation', (e) => {
            if (!isReady) return;
            const alpha = Math.round(e.alpha);
            const beta = Math.round(e.beta);
            const gamma = Math.round(e.gamma);
            if (gyroActive) {
                statusDiv.innerHTML = `🟢 ${alpha}° ${beta}° ${gamma}°`;
            }
        });
        
        console.log('🚀 Загружено');
    </script>
</body>
</html>
