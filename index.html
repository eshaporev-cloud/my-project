let current=ROOMS[0];
let viewer=null;
function initFullscreenFix(){const c=document.getElementById('viewer'),p=document.getElementById('plan-wrap');if(!c)return;const m=()=>{if(document.fullscreenElement){if(p&&!c.contains(p)){c.appendChild(p);p.style.position='fixed';p.style.bottom='16px';p.style.right='16px';p.style.zIndex='10000'}}else{if(p&&c.contains(p)&&document.body)document.body.appendChild(p)}};document.addEventListener('fullscreenchange',m);m()}
function initViewer(room){if(viewer)try{viewer.destroy()}catch(e){}viewer=new Viewer({container:document.getElementById('viewer'),panorama:room.dataUrl,navbar:['zoom','fullscreen','caption','gyroscope','vr'],caption:room.name,defaultZoomLvl:0,minFov:30,maxFov:110,mousewheel:true,moveSpeed:1.5,zoomSpeed:1.2});viewer.addEventListener('ready',()=>{updateActiveShape();setTimeout(()=>{initFullscreenFix();},100)});}
function updateActiveShape(){
    document.querySelectorAll('.room-shape').forEach(s=>{
        const id=parseInt(s.getAttribute('data-room'));
        const isActive=(id===current.id);
        s.classList[isActive?'add':'remove']('active');
        s.style.opacity=isActive?'1':'0.5';
    });
    document.querySelectorAll('.room-label').forEach(l=>{
        l.style.opacity='1';
    });
}
function switchRoom(room){if(!room||room.id===current.id)return;current=room;updateActiveShape();try{viewer.setPanorama(room.dataUrl,{caption:room.name,transition:true});}catch(e){initViewer(room);}}
