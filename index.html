<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тест гироскопа PSV - Android</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.11.0/index.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #viewer { width: 100%; height: 100%; }
        #status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="status">Загрузка...</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.min.js",
                "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.11.0/index.module.min.js",
                "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5.11.0/index.module.min.js"
            }
        }
    </script>
    
    <script type="module">
        import { Viewer } from '@photo-sphere-viewer/core';
        import { GyroscopePlugin } from '@photo-sphere-viewer/gyroscope-plugin';
        
        const statusDiv = document.getElementById('status');
        
        // Проверка поддержки гироскопа
        if ('ondeviceorientation' in window) {
            statusDiv.textContent = '✅ Гироскоп поддерживается';
        } else {
            statusDiv.textContent = '❌ Гироскоп НЕ поддерживается';
        }
        
        // Слушаем события гироскопа для отладки
        window.addEventListener('deviceorientation', (e) => {
            console.log('Гироскоп:', e.alpha, e.beta, e.gamma);
            statusDiv.textContent = `🎯 α:${Math.round(e.alpha)} β:${Math.round(e.beta)} γ:${Math.round(e.gamma)}`;
        });
        
        // Создаём панораму СРАЗУ с плагином гироскопа
        const viewer = new Viewer({
            container: 'viewer',
            panorama: 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg',
            navbar: ['zoom', 'fullscreen', 'caption'],
            caption: 'Тест гироскопа',
            plugins: [
                [GyroscopePlugin, { absolutePosition: true }]
            ]
        });
        
        viewer.addEventListener('ready', () => {
            statusDiv.textContent = '✅ Гироскоп активирован! Поверни телефон';
        });
    </script>
</body>
</html>
