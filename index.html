function showFullscreenMessage(msg) {
    let toast = document.getElementById('fullscreen-toast');
    if (!toast) {
        toast = document.createElement('div');
        toast.id = 'fullscreen-toast';
        toast.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);backdrop-filter:blur(10px);color:white;padding:12px 24px;border-radius:40px;font-size:14px;font-weight:500;z-index:20001;pointer-events:none;white-space:nowrap;font-family:system-ui,-apple-system,sans-serif';
        document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.animation = 'none';
    toast.offsetHeight;
    toast.style.animation = 'fadeOutFullscreen 1s ease forwards';
    setTimeout(() => { if(toast.parentNode) toast.remove(); }, 1000);
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => { console.log('Fullscreen error:', err); });
        showFullscreenMessage('⛶ Полноэкранный режим');
    } else {
        document.exitFullscreen();
        showFullscreenMessage('✖ Выход из полноэкранного режима');
    }
}

class TouchManager {
    constructor(element) {
        this.element = element;
        this.init();
    }
    init() {
        this.element.style.touchAction = 'none';
        this.element.addEventListener('touchstart', this.onTouchStart.bind(this), { passive: false });
        this.element.addEventListener('touchend', this.onTouchEnd.bind(this));
        this.element.addEventListener('touchcancel', this.onTouchCancel.bind(this));
        this.element.addEventListener('contextmenu', (e) => e.preventDefault());
        this.element.addEventListener('dragstart', (e) => e.preventDefault());
    }
    onTouchStart(e) {
        e.preventDefault();
        this.touchStartX = e.touches[0].clientX;
        this.touchStartY = e.touches[0].clientY;
        this.touchStartTime = Date.now();
    }
    onTouchEnd(e) {
        if (Date.now() - this.touchStartTime < 300) this.onTap(e);
        this.touchStartTime = 0;
    }
    onTap(e) {
        const touch = e.changedTouches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        const roomShape = target?.closest('.room-shape');
        if (roomShape) {
            const roomId = parseInt(roomShape.getAttribute('data-room'));
            const room = ROOMS.find(r => r.id === roomId);
            if (room) {
                updateActiveRoom(roomId);
                switchRoom(room);
            }
        }
    }
    onTouchCancel() { this.touchStartTime = 0; }
    destroy() { this.element.style.touchAction = ''; }
}

function initFullscreenFix() {
    const planWrapElem = document.getElementById('plan-wrap');
    const gyroBtnElem = document.getElementById('gyroBtn');
    const handleFullscreenChange = () => {
        const isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
        if (isFullscreen) {
            const fsElement = document.fullscreenElement || document.webkitFullscreenElement;
            if (planWrapElem && !fsElement.contains(planWrapElem)) fsElement.appendChild(planWrapElem);
            if (gyroBtnElem && !fsElement.contains(gyroBtnElem)) fsElement.appendChild(gyroBtnElem);
            planWrapElem.style.position = 'fixed';
            planWrapElem.style.bottom = '48px';
            planWrapElem.style.right = '12px';
            planWrapElem.style.zIndex = '20000';
        } else {
            if (planWrapElem && planWrapElem.parentElement !== document.body) document.body.appendChild(planWrapElem);
            if (gyroBtnElem && gyroBtnElem.parentElement !== document.body) document.body.appendChild(gyroBtnElem);
            planWrapElem.style.position = 'fixed';
            planWrapElem.style.bottom = '48px';
            planWrapElem.style.right = '12px';
            planWrapElem.style.zIndex = '20000';
        }
    };
    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

        }
    });
    
    
}

    const oldActive = svgElem.querySelector('.room-shape-active');
    if(oldActive) oldActive.remove();
    const activeRoomData = ROOMS.find(r => r.id === roomId);
    if(activeRoomData && activeRoomData.pathD) {
        const svgNS = "http://www.w3.org/2000/svg";
        const activePath = document.createElementNS(svgNS, "path");
        activePath.setAttribute("d", activeRoomData.pathD);
        activePath.setAttribute("fill", "none");
        activePath.setAttribute("stroke", "#ff6600");
        activePath.setAttribute("stroke-width", "5");
        activePath.setAttribute("stroke-linejoin", "round");
        activePath.classList.add("room-shape-active");
        activePath.setAttribute("data-room", roomId);
        svgElem.appendChild(activePath);
    }
}

function updateUI() {
    if (gyroActive) {
        gyroBtn.classList.add('active');
        gyroBtn.style.background = '#1a73e8';
        gyroBtn.style.boxShadow = '0 0 15px #1a73e8';
    } else {
        gyroBtn.classList.remove('active');
        gyroBtn.style.background = '';
        gyroBtn.style.boxShadow = '';
    }
}

async function requestGyroscopePermission() {
    if (isIOS && typeof DeviceOrientationEvent !== 'undefined' && 
        typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
            const permission = await DeviceOrientationEvent.requestPermission();
            return permission === 'granted';
        } catch(e) { 
            console.log('Gyro permission denied:', e);
            return false;
        }
    }
    return true;
}

function enableGyroscope() {
    if (!gyroPlugin || gyroActive) return;
    try {
        gyroPlugin.start();
        gyroActive = true;
        updateUI();
    } catch(e) { console.error(e); }
}

function disableGyroscope() {
    if (!gyroPlugin || !gyroActive) return;
    try {
        gyroPlugin.stop();
        gyroActive = false;
        updateUI();
    } catch(e) { console.error(e); }
}

async function toggleGyroscope() {
    if (!isReady) return;
    if (!gyroActive) {
        const granted = await requestGyroscopePermission();
        if (!granted) return;
        enableGyroscope();
    } else {
        disableGyroscope();
    }
}

function onTouchRestart(e) {
    if (e.target.closest && e.target.closest('.gyro-btn')) return;
    if (gyroActive && isReady && gyroPlugin) {
        gyroPlugin.stop();
        setTimeout(() => { if (gyroActive && gyroPlugin) gyroPlugin.start(); }, 50);
    }
}

function switchRoom(room) {
    if(!room || room.id === current.id) return;
    current = room;
    try {
        viewer.setPanorama(room.dataUrl, { caption: room.name, transition: { duration: 300 } });
        setTimeout(() => { if (gyroActive && gyroPlugin) { gyroPlugin.stop(); setTimeout(() => gyroPlugin.start(), 50); } }, 50);
    } catch(e) { initViewer(room); }
}

initPlanMap();
initViewer(ROOMS[0]);

document.addEventListener('keydown', e => {
    if(!ROOMS.length) return;
    let idx = ROOMS.findIndex(r => r.id === current.id);
    if(e.key === 'ArrowRight' || e.key === 'ArrowDown'){ e.preventDefault(); switchRoom(ROOMS[(idx + 1) % ROOMS.length]); }
    else if(e.key === 'ArrowLeft' || e.key === 'ArrowUp'){ e.preventDefault(); switchRoom(ROOMS[(idx - 1 + ROOMS.length) % ROOMS.length]); }
});
</script></body></html>
