let current = ROOMS[0];
let viewer = null;
let planWrap = null;
let gyroActive = false;
let gyroPlugin = null;
let isReady = false;

const gyroBtn = document.getElementById('gyroBtn');

function updateUI() {
    if (gyroActive) {
        gyroBtn.classList.add('active');
    } else {
        gyroBtn.classList.remove('active');
    }
}

function restartGyroscope() {
    if (!gyroPlugin || !gyroActive || !isReady) return;
    try {
        gyroPlugin.stop();
        setTimeout(() => {
            if (gyroActive && gyroPlugin) gyroPlugin.start();
        }, 50);
    } catch(e) {}
}

function enableGyroscope() {
    if (!gyroPlugin || gyroActive) return;
    try {
        gyroPlugin.start();
        gyroActive = true;
        updateUI();
    } catch(e) { console.error(e); }
}

function disableGyroscope() {
    if (!gyroPlugin || !gyroActive) return;
    try {
        gyroPlugin.stop();
        gyroActive = false;
        updateUI();
    } catch(e) { console.error(e); }
}

function toggleGyroscope() {
    if (!isReady) return;
    if (gyroActive) {
        disableGyroscope();
    } else {
        enableGyroscope();
    }
}

function onTouchRestart(e) {
    if (e.target.closest && e.target.closest('.gyro-btn')) return;
    if (gyroActive && isReady && gyroPlugin) {
        gyroPlugin.stop();
        setTimeout(() => {
            if (gyroActive && gyroPlugin) gyroPlugin.start();
        }, 50);
    }
}

function handlePlanClick(e){
    const target = e.target;
    if(!target.classList.contains('room-shape')) return;
    const roomId = target.getAttribute('data-room');
    if(roomId){
        const room = ROOMS.find(r => r.id === parseInt(roomId));
        if(room) switchRoom(room);
    }
}

function handlePlanTouch(e){
    e.preventDefault();
    const target = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    if(!target || !target.classList.contains('room-shape')) return;
    const roomId = target.getAttribute('data-room');
    if(roomId){
        const room = ROOMS.find(r => r.id === parseInt(roomId));
        if(room) switchRoom(room);
    }
}

function initFullscreenFix() {
    const container = document.getElementById('viewer');
    const gyroBtn = document.getElementById('gyroBtn');
    
    if (!container || !planWrap) return;
    
    const handle = () => {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            const fs = document.fullscreenElement || document.webkitFullscreenElement;
            
            if (!fs.contains(planWrap)) fs.appendChild(planWrap);
            if (gyroBtn && !fs.contains(gyroBtn)) fs.appendChild(gyroBtn);
            
            planWrap.style.position = 'fixed';
            planWrap.style.bottom = '48px';
            planWrap.style.right = '12px';
            planWrap.style.padding = '4px';
            planWrap.style.zIndex = '10000';
            planWrap.style.width = '200px';
            planWrap.style.height = '200px';
            planWrap.style.maxWidth = 'none';
            planWrap.style.minWidth = '0px';
            
        } else {
            if (planWrap.parentElement !== document.body) document.body.appendChild(planWrap);
            if (gyroBtn && gyroBtn.parentElement !== document.body) document.body.appendChild(gyroBtn);
            
            planWrap.style.position = '';
            planWrap.style.bottom = '';
            planWrap.style.right = '';
            planWrap.style.padding = '';
            planWrap.style.zIndex = '';
            planWrap.style.width = '';
            planWrap.style.height = '';
            planWrap.style.maxWidth = '';
            planWrap.style.minWidth = '';
        }
    };
    
    document.addEventListener('fullscreenchange', handle);
    document.addEventListener('webkitfullscreenchange', handle);
    handle();
}

function initViewer(room){
    if(viewer) try{ viewer.destroy(); } catch(e){}
    viewer = new Viewer({
        container: document.getElementById('viewer'),
        panorama: room.dataUrl,
        navbar: ['fullscreen', 'caption'],
        caption: room.name,
        defaultZoomLvl: 0,
        minFov: 30,
        maxFov: 110,
        mousewheel: true,
        moveSpeed: 1.5,
        zoomSpeed: 1.2,
        plugins: [
            [GyroscopePlugin, {
                absolutePosition: true,
                touchmove: false,
                moveMode: 'fast'
            }]
        ]
    });
    viewer.addEventListener('ready', () => {
        isReady = true;
        gyroPlugin = viewer.getPlugin(GyroscopePlugin);
        updateActiveShape();
        setTimeout(initFullscreenFix, 100);
        
        if (gyroPlugin) {
            gyroBtn.addEventListener('click', toggleGyroscope);
            document.body.addEventListener('touchstart', onTouchRestart, { passive: false });
            document.body.addEventListener('mousedown', onTouchRestart);
        }
    });
}

function updateActiveShape(){
    if(!planWrap) return;
    planWrap.querySelectorAll('.room-shape').forEach(s => {
        const isActive = parseInt(s.getAttribute('data-room')) === current.id;
        s.classList[isActive ? 'add' : 'remove']('active');
        s.style.opacity = isActive ? '1' : '0.5';
    });
}

function switchRoom(room){
    if(!room || room.id === current.id) return;
    current = room;
    updateActiveShape();
    try {
        viewer.setPanorama(room.dataUrl, { caption: room.name, transition: true });
        setTimeout(() => {
            if (gyroActive && gyroPlugin) {
                gyroPlugin.stop();
                setTimeout(() => gyroPlugin.start(), 100);
            }
        }, 200);
    } catch(e){
        initViewer(room);
    }
}

initPlanMap();
initViewer(ROOMS[0]);

document.addEventListener('keydown', e => {
    if(!ROOMS.length) return;
    let idx = ROOMS.findIndex(r => r.id === current.id);
    if(e.key === 'ArrowRight' || e.key === 'ArrowDown'){
        e.preventDefault();
        switchRoom(ROOMS[(idx + 1) % ROOMS.length]);
    } else if(e.key === 'ArrowLeft' || e.key === 'ArrowUp'){
        e.preventDefault();
        switchRoom(ROOMS[(idx - 1 + ROOMS.length) % ROOMS.length]);
    }
});
