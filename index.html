<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тест гироскопа - PSV 4</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer@4.7.3/dist/photo-sphere-viewer.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #viewer { width: 100%; height: 100%; }
        #status {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #ff8c42;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="status">🔄 Загрузка...</div>
    
    <!-- PSV 4 не поддерживает ES modules, подключаем обычными скриптами -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer@4.7.3/dist/photo-sphere-viewer.min.js"></script>
    
    <script>
        const statusDiv = document.getElementById('status');
        let viewer = null;
        
        // Проверка загрузки библиотеки
        if (typeof PhotoSphereViewer === 'undefined') {
            statusDiv.textContent = '❌ Ошибка: библиотека не загрузилась';
            statusDiv.style.color = '#ff4757';
        } else {
            statusDiv.textContent = '✅ Библиотека загружена';
            
            viewer = new PhotoSphereViewer.Viewer({
                container: 'viewer',
                panorama: 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg',
                navbar: ['zoom', 'fullscreen', 'caption', 'gyroscope'],
                caption: 'Поверни телефон или нажми иконку телефона',
                defaultZoomLvl: 0,
                minFov: 30,
                maxFov: 110,
                mousewheel: true,
                gyroscope: true
            });
            
            viewer.on('ready', () => {
                statusDiv.textContent = '✅ Готово! Нажми fullscreen → иконку телефона → поверни';
                
                // Автоматически включаем гироскоп через 2 секунды
                setTimeout(() => {
                    if (viewer.plugins && viewer.plugins.gyroscope) {
                        viewer.plugins.gyroscope.start();
                        statusDiv.textContent = '🎯 Гироскоп активирован! Поворачивай телефон';
                    }
                }, 2000);
            });
        }
    </script>
</body>
</html>
