<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>VR Тур 360</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.7.4/index.min.css"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:system-ui,sans-serif;background:#000}
        #viewer{width:100vw;height:100vh;position:fixed;top:0;left:0}
        #plan-wrap{position:fixed;bottom:16px;right:16px;z-index:20000;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:12px;padding:6px;width:200px;height:200px;cursor:pointer;transition:opacity 0.3s ease;touch-action:manipulation}
        #plan-wrap:not(:hover){opacity:0.6}
        #plan-wrap:hover{opacity:1}
        #plan-wrap svg{width:100%;height:100%;display:block}
        .room-shape{cursor:pointer;transition:all .3s;pointer-events:all}
        .room-shape.active{animation:pulse 2s infinite;filter:brightness(1.1)}
        @keyframes pulse{0%,100%{filter:brightness(.95)}50%{filter:brightness(1.2)}}
        .gyro-btn{position:fixed;top:20px;right:20px;width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);cursor:pointer;z-index:10000;display:flex;align-items:center;justify-content:center;transition:all 0.2s ease;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
        .gyro-btn svg{width:22px;height:22px;fill:none;stroke:white;stroke-width:1.5}
        .gyro-btn.active{background:#ff8c42;box-shadow:0 0 16px rgba(255,140,66,0.5)}
        .gyro-btn.active svg{stroke:#1e1f2c}
        .gyro-status{position:fixed;bottom:20px;left:20px;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);padding:4px 10px;border-radius:20px;font-size:10px;font-family:system-ui,sans-serif;color:rgba(255,255,255,0.6);z-index:10000;pointer-events:none}
        @media (max-width:768px) and (orientation:portrait){#plan-wrap{width:35vw;height:35vw;max-width:250px;min-width:120px}}
        @media (max-width:768px) and (orientation:landscape){#plan-wrap{width:25vh;height:25vh;max-width:180px;min-width:100px}}
    </style>
</head>

            <path d="M8 10 Q12 6 16 10" stroke="currentColor" fill="none"/>

        </svg>

        let current = ROOMS[0];

        const statusDiv = document.getElementById('gyroStatus');

        function updateUI() {
            if (gyroActive) {
                gyroBtn.classList.add('active');
                statusDiv.innerHTML = '🟢 Гироскоп активен';
                statusDiv.style.color = '#ff8c42';
            } else {
                gyroBtn.classList.remove('active');
                statusDiv.innerHTML = '⚪ Гироскоп выключен';
                statusDiv.style.color = 'rgba(255,255,255,0.6)';
            }
        }

        function restartGyroscope() {
            if (!gyroPlugin || !gyroActive || !isReady) return;
            try {
                gyroPlugin.stop();
                setTimeout(() => { if (gyroActive && gyroPlugin) gyroPlugin.start(); }, 50);
            } catch(e) {}
        }

        function enableGyroscope() {
            if (!gyroPlugin || gyroActive) return;
            try {
                gyroPlugin.start();
                gyroActive = true;
                updateUI();
            } catch(e) { console.error(e); }
        }

        function disableGyroscope() {
            if (!gyroPlugin || !gyroActive) return;
            try {
                gyroPlugin.stop();
                gyroActive = false;
                updateUI();
            } catch(e) { console.error(e); }
        }

        function toggleGyroscope() {
            if (!isReady) return;
            if (gyroActive) { disableGyroscope(); }
            else { enableGyroscope(); }
        }

        function onTouchRestart(e) {

            if (gyroActive && isReady && gyroPlugin) {

                setTimeout(() => { if (gyroActive && gyroPlugin) gyroPlugin.start(); }, 50);
            }
        }

        function handlePlanClick(e){
            const target = e.target;
            if(!target.classList.contains('room-shape')) return;
            const roomId = target.getAttribute('data-room');
            if(roomId){
                const room = ROOMS.find(r => r.id === parseInt(roomId));
                if(room) switchRoom(room);
            }
        }

        function handlePlanTouch(e){
            e.preventDefault();
            const target = document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
            if(!target || !target.classList.contains('room-shape')) return;
            const roomId = target.getAttribute('data-room');
            if(roomId){
                const room = ROOMS.find(r => r.id === parseInt(roomId));
                if(room) switchRoom(room);
            }
        }

        function initFullscreenFix() {
            const container = document.getElementById('viewer');
            const gyroBtn = document.getElementById('gyroBtn');
            const gyroStatus = document.getElementById('gyroStatus');
            
            if (!container || !planWrap) return;
            
            function applySize(fullscreen) {
                // Перенос элементов в fullscreen и обратно
                if (fullscreen) {
                    const fs = document.fullscreenElement || document.webkitFullscreenElement;
                    if (!fs.contains(planWrap)) fs.appendChild(planWrap);
                    if (gyroBtn && !fs.contains(gyroBtn)) fs.appendChild(gyroBtn);
                    if (gyroStatus && !fs.contains(gyroStatus)) fs.appendChild(gyroStatus);
                } else {
                    if (planWrap.parentElement !== document.body) document.body.appendChild(planWrap);
                    if (gyroBtn && gyroBtn.parentElement !== document.body) document.body.appendChild(gyroBtn);
                    if (gyroStatus && gyroStatus.parentElement !== document.body) document.body.appendChild(gyroStatus);
                }
                
                // Сбрасываем все inline-стили — возвращаем власть CSS
                planWrap.style.position = '';
                planWrap.style.bottom = '';
                planWrap.style.right = '';
                planWrap.style.padding = '';
                planWrap.style.zIndex = '';
                planWrap.style.width = '';
                planWrap.style.height = '';
                planWrap.style.maxWidth = '';
                planWrap.style.minWidth = '';
                
                // Читаем размер, который установил CSS
                var cssWidth = planWrap.offsetWidth;
                var cssHeight = planWrap.offsetHeight;
                
                // В fullscreen — уменьшаем в 1.5 раза
                if (fullscreen) {
                    planWrap.style.position = 'fixed';
                    planWrap.style.zIndex = '10000';
                    planWrap.style.bottom = '12px';
                    planWrap.style.right = '12px';
                    planWrap.style.padding = '4px';
                    planWrap.style.width = (cssWidth / 1.5) + 'px';
                    planWrap.style.height = (cssHeight / 1.5) + 'px';
                    planWrap.style.maxWidth = 'none';
                    planWrap.style.minWidth = '0px';
                }
            }
            
            function handle() {
                var fullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
                applySize(fullscreen);
            }
            
            document.addEventListener('fullscreenchange', handle);
            document.addEventListener('webkitfullscreenchange', handle);
            window.addEventListener('resize', function(){ setTimeout(handle, 50); });
            window.addEventListener('orientationchange', function(){ setTimeout(handle, 150); });
            handle();
        }

        function initViewer(room){
            if(viewer) try{ viewer.destroy(); } catch(e){}
            viewer = new Viewer({

                panorama: room.dataUrl,

                mousewheel: true,

                zoomSpeed: 1.2,
                plugins: [[GyroscopePlugin, { absolutePosition: true, touchmove: false, moveMode: 'fast' }]]
            });

                isReady = true;
                gyroPlugin = viewer.getPlugin(GyroscopePlugin);
                updateActiveShape();
                setTimeout(initFullscreenFix, 100);
                if (gyroPlugin) {
                    gyroBtn.addEventListener('click', toggleGyroscope);
                    document.body.addEventListener('touchstart', onTouchRestart, { passive: false });
                    document.body.addEventListener('mousedown', onTouchRestart);

                } else {
                    statusDiv.innerHTML = '❌ Ошибка';
                }
            });
        }

        function updateActiveShape(){
            if(!planWrap) return;
            planWrap.querySelectorAll('.room-shape').forEach(s => {
                const isActive = parseInt(s.getAttribute('data-room')) === current.id;
                s.classList[isActive ? 'add' : 'remove']('active');
                s.style.opacity = isActive ? '1' : '0.5';
            });
        }

        function switchRoom(room){
            if(!room || room.id === current.id) return;
            current = room;
            updateActiveShape();
            try {
                viewer.setPanorama(room.dataUrl, { caption: room.name, transition: true });
                setTimeout(() => {
                    if (gyroActive && gyroPlugin) {
                        gyroPlugin.stop();
                        setTimeout(() => gyroPlugin.start(), 100);
                    }
                }, 200);
            } catch(e){
                initViewer(room);
            }
        }

            } else if(e.key === 'ArrowLeft' || e.key === 'ArrowUp'){
                e.preventDefault();
                switchRoom(ROOMS[(idx - 1 + ROOMS.length) % ROOMS.length]);
            }
        });
    </script>
</body>
</html>
