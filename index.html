<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PSV 5.7.4 - Кнопка гироскопа в панели</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.7.4/index.min.css">
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        #viewer {
            width: 100%;
            height: 100%;
        }
        
        /* Кастомная кнопка в панели PSV будет стилизована автоматически */
        .psv-navbar .psv-button.custom-gyro-button svg {
            width: 20px;
            height: 20px;
        }
        /* Активное состояние кнопки */
        .psv-navbar .psv-button.custom-gyro-button.active {
            background: rgba(255, 140, 66, 0.3);
        }
        .psv-navbar .psv-button.custom-gyro-button.active svg {
            filter: drop-shadow(0 0 2px #ff8c42);
        }
    </style>
</head>
<body>
    <div id="viewer"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.min.js",
                "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.7.4/index.module.min.js",
                "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5.7.4/index.module.min.js"
            }
        }
    </script>

    <script type="module">
        import { Viewer } from '@photo-sphere-viewer/core';
        import { GyroscopePlugin } from '@photo-sphere-viewer/gyroscope-plugin';
        
        let viewer = null;
        let gyroPlugin = null;
        let gyroActive = false;
        let isReady = false;
        let gyroButton = null;
        
        // SVG иконка телефона с волнами
        const gyroIcon = `
            <svg viewBox="0 0 24 24" width="20" height="20">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2" stroke="currentColor" fill="none" stroke-width="1.5"/>
                <line x1="12" y1="18" x2="12" y2="18" stroke="currentColor" stroke-width="2"/>
                <circle cx="12" cy="18" r="1" fill="currentColor"/>
                <path d="M8 10 Q12 6 16 10" stroke="currentColor" fill="none" stroke-width="1.5"/>
                <path d="M6 13 Q12 8 18 13" stroke="currentColor" fill="none" stroke-width="1.5" opacity="0.6"/>
            </svg>
        `;
        
        // Перезапуск гироскопа после касаний
        function restartGyroscope() {
            if (!gyroPlugin || !gyroActive || !isReady) return;
            try {
                gyroPlugin.stop();
                setTimeout(() => {
                    if (gyroActive && gyroPlugin) gyroPlugin.start();
                }, 10);
            } catch(e) {}
        }
        
        // Включение гироскопа
        function enableGyroscope() {
            if (!gyroPlugin || gyroActive) return;
            try {
                gyroPlugin.start();
                gyroActive = true;
                if (gyroButton) gyroButton.classList.add('active');
                console.log('✅ Гироскоп включен');
            } catch(e) { console.error(e); }
        }
        
        // Выключение гироскопа
        function disableGyroscope() {
            if (!gyroPlugin || !gyroActive) return;
            try {
                gyroPlugin.stop();
                gyroActive = false;
                if (gyroButton) gyroButton.classList.remove('active');
                console.log('⭕ Гироскоп выключен');
            } catch(e) { console.error(e); }
        }
        
        // Toggle
        function toggleGyroscope() {
            if (!isReady) return;
            if (gyroActive) {
                disableGyroscope();
            } else {
                enableGyroscope();
            }
        }
        
        // Обработчик касаний для перезапуска гироскопа (но не по кнопке)
        function onTouchStart(e) {
            // Проверяем, не нажата ли кнопка гироскопа или другие кнопки навбара
            const target = e.target;
            if (target.closest && (target.closest('.psv-button') || target.closest('.gyro-btn'))) return;
            if (gyroActive && isReady) {
                restartGyroscope();
            }
        }
        
        // Инициализация просмотрщика
        viewer = new Viewer({
            container: 'viewer',
            panorama: 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg',
            navbar: ['zoom', 'fullscreen', 'caption'],
            caption: 'Гироскоп в панели',
            plugins: [
                [GyroscopePlugin, {
                    absolutePosition: true,
                    touchmove: false,
                    moveMode: 'fast'
                }]
            ]
        });
        
        viewer.addEventListener('ready', () => {
            isReady = true;
            gyroPlugin = viewer.getPlugin(GyroscopePlugin);
            
            if (gyroPlugin) {
                // Добавляем кнопку в панель навигации
                const navbar = viewer.navbar;
                
                gyroButton = navbar.addButton({
                    id: 'gyroscope-toggle',
                    className: 'custom-gyro-button',
                    content: gyroIcon,
                    title: 'Включить/выключить гироскоп',
                    onClick: toggleGyroscope
                });
                
                console.log('✅ Кнопка гироскопа добавлена в панель');
                
                // Обработчики касаний для перезапуска
                document.body.addEventListener('touchstart', onTouchStart, { passive: false });
                document.body.addEventListener('mousedown', onTouchStart);
            } else {
                console.error('❌ Плагин гироскопа не найден');
            }
        });
        
        // Для отладки — показываем значения гироскопа в консоли
        window.addEventListener('deviceorientation', (e) => {
            if (!isReady || !gyroActive) return;
            // Не засоряем консоль, только при активном гироскопе и с интервалом
            if (Math.random() < 0.05) {
                console.log(`🎯 α:${Math.round(e.alpha)} β:${Math.round(e.beta)} γ:${Math.round(e.gamma)}`);
            }
        });
        
        console.log('🚀 Тестовый файл загружен');
    </script>
</body>
</html>
