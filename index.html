<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PSV 5.7.4 - Гироскоп с авто-перезапуском</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.7.4/index.min.css">
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #viewer { width: 100%; height: 100%; }
        
        #status {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            color: #ff8c42;
            padding: 6px 14px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            font-weight: 500;
        }
        
        .gyro-toggle {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            z-index: 101;
            transition: all 0.2s ease;
            font-family: system-ui, sans-serif;
        }
        .gyro-toggle.active {
            background: #ff8c42;
            color: #1e1f2c;
            border-color: #ff8c42;
        }
        .gyro-toggle:active { transform: translateX(-50%) scale(0.96); }
        
        .note {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            color: #aaa;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 10px;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
        }
        
        @media (max-width: 600px) {
            .gyro-toggle { padding: 8px 20px; font-size: 13px; bottom: 16px; }
            .note { bottom: 80px; font-size: 9px; }
            #status { font-size: 10px; top: 12px; }
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="status">🔄 Загрузка...</div>
    <div class="note">📱 Кнопка внизу — гироскоп | Касания экрана НЕ отключают</div>
    <button class="gyro-toggle" id="gyroToggle">🎯 Включить гироскоп</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.min.js",
                "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.7.4/index.module.min.js",
                "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5.7.4/index.module.min.js"
            }
        }
    </script>

    <script type="module">
        import { Viewer } from '@photo-sphere-viewer/core';
        import { GyroscopePlugin } from '@photo-sphere-viewer/gyroscope-plugin';
        
        const statusDiv = document.getElementById('status');
        const toggleBtn = document.getElementById('gyroToggle');
        
        let viewer = null;
        let gyroPlugin = null;
        let gyroActive = false;
        let isReady = false;
        
        // Перезапуск гироскопа (чиним касания)
        function restartGyroscope() {
            if (!gyroPlugin || !gyroActive) return;
            try {
                // Останавливаем и сразу запускаем снова
                gyroPlugin.stop();
                setTimeout(() => {
                    gyroPlugin.start();
                    console.log('🔄 Гироскоп перезапущен после касания');
                }, 10);
            } catch(e) {
                console.warn('Ошибка перезапуска:', e);
            }
        }
        
        // Включение гироскопа
        function enableGyroscope() {
            if (!gyroPlugin || gyroActive) return;
            try {
                gyroPlugin.start();
                gyroActive = true;
                toggleBtn.textContent = '🔴 Выключить гироскоп';
                toggleBtn.classList.add('active');
                statusDiv.textContent = '🎯 Гироскоп ВКЛЮЧЕН | Поворачивай телефон';
                statusDiv.style.color = '#2ecc71';
                console.log('✅ Гироскоп включен');
            } catch(e) {
                console.error('Ошибка включения:', e);
            }
        }
        
        // Выключение гироскопа
        function disableGyroscope() {
            if (!gyroPlugin || !gyroActive) return;
            try {
                gyroPlugin.stop();
                gyroActive = false;
                toggleBtn.textContent = '🎯 Включить гироскоп';
                toggleBtn.classList.remove('active');
                statusDiv.textContent = '⭕ Гироскоп ВЫКЛЮЧЕН | Вращай пальцем';
                statusDiv.style.color = '#ff8c42';
                console.log('⭕ Гироскоп выключен');
            } catch(e) {
                console.error('Ошибка выключения:', e);
            }
        }
        
        // Toggle
        function toggleGyroscope() {
            if (!isReady) return;
            if (gyroActive) {
                disableGyroscope();
            } else {
                enableGyroscope();
            }
        }
        
        // Глобальный обработчик касаний — перезапускаем гироскоп если он активен
        function onTouchStart() {
            if (gyroActive && isReady) {
                console.log('👆 Касание экрана — перезапуск гироскопа');
                statusDiv.textContent = '🔄 Гироскоп перезапускается...';
                setTimeout(() => {
                    restartGyroscope();
                    if (gyroActive) {
                        statusDiv.textContent = '🎯 Гироскоп активен | Поворачивай телефон';
                    }
                }, 50);
            }
        }
        
        // Инициализация просмотрщика
        viewer = new Viewer({
            container: 'viewer',
            panorama: 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg',
            navbar: ['zoom', 'fullscreen', 'caption'],
            caption: 'Гироскоп не отключается при касаниях',
            plugins: [
                [GyroscopePlugin, {
                    absolutePosition: true,
                    touchmove: false,
                    moveMode: 'fast'
                }]
            ]
        });
        
        viewer.addEventListener('ready', () => {
            isReady = true;
            gyroPlugin = viewer.getPlugin(GyroscopePlugin);
            
            if (gyroPlugin) {
                statusDiv.textContent = '✅ Панорама готова | Нажми кнопку внизу';
                console.log('✅ Плагин гироскопа найден');
                
                // Добавляем обработчик касаний для перезапуска
                document.body.addEventListener('touchstart', onTouchStart, { passive: false });
                document.body.addEventListener('mousedown', onTouchStart);
            } else {
                statusDiv.textContent = '❌ Ошибка: плагин не загружен';
                statusDiv.style.color = '#ff4757';
                toggleBtn.style.opacity = '0.5';
                toggleBtn.style.pointerEvents = 'none';
            }
        });
        
        toggleBtn.addEventListener('click', toggleGyroscope);
        
        // Отображение значений гироскопа
        window.addEventListener('deviceorientation', (e) => {
            if (!isReady) return;
            const alpha = Math.round(e.alpha);
            const beta = Math.round(e.beta);
            const gamma = Math.round(e.gamma);
            
            if (gyroActive) {
                statusDiv.innerHTML = `🎯 ${alpha}° ${beta}° ${gamma}°<br>🟢 Гироскоп активен`;
            } else {
                statusDiv.innerHTML = `⭕ ${alpha}° ${beta}° ${gamma}°<br>⚫ Гироскоп выключен`;
            }
        });
        
        console.log('🚀 Тестовый файл загружен');
    </script>
</body>
</html>
