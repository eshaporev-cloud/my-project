<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PSV 5.7.4 - Финальный тест гироскопа</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.7.4/index.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #viewer { width: 100%; height: 100%; }
        #status {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #ff8c42;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            white-space: nowrap;
            text-align: center;
        }
        .note {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 11px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="viewer"></div>
    <div id="status">🔄 Загрузка...</div>
    <div class="note">⚠️ Не касайся экрана после запуска (чтобы не активировать ручной режим)</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.min.js",
                "@photo-sphere-viewer/core": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5.7.4/index.module.min.js",
                "@photo-sphere-viewer/gyroscope-plugin": "https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/gyroscope-plugin@5.7.4/index.module.min.js"
            }
        }
    </script>

    <script type="module">
        import { Viewer } from '@photo-sphere-viewer/core';
        import { GyroscopePlugin } from '@photo-sphere-viewer/gyroscope-plugin';
        
        const statusDiv = document.getElementById('status');
        
        // Выводим значения для отладки
        window.addEventListener('deviceorientation', (e) => {
            statusDiv.innerHTML = `🎯 α:${Math.round(e.alpha)} β:${Math.round(e.beta)} γ:${Math.round(e.gamma)}<br>👆 Не касайся экрана!`;
        });
        
        const viewer = new Viewer({
            container: 'viewer',
            panorama: 'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/textures/planets/earth_atmos_2048.jpg',
            navbar: ['zoom', 'fullscreen', 'caption'],
            caption: 'Гироскоп активирован — крути телефон!',
            plugins: [
                [GyroscopePlugin, {
                    // Абсолютное позиционирование обязательно для вращения
                    absolutePosition: true,   
                    // Отключаем ручное управление — иначе касание убивает гироскоп
                    touchmove: false,         
                    // Быстрый режим для Android
                    moveMode: 'fast'          
                }]
            ]
        });
        
        viewer.addEventListener('ready', () => {
            console.log('✅ Viewer готов, гироскоп активирован');
            statusDiv.style.color = '#2ecc71';
            statusDiv.innerHTML = '✅ Готово! Крути телефон<br>(только не касайся экрана)';
        });
        
        // Дополнительная страховка: если пользователь коснулся экрана, принудительно перезапускаем гироскоп через 2 секунды
        document.body.addEventListener('touchstart', () => {
            statusDiv.innerHTML = '⚠️ Касание экрана — отключаю ручной режим...';
            setTimeout(() => {
                const gyro = viewer.getPlugin(GyroscopePlugin);
                if (gyro) {
                    gyro.stop();
                    gyro.start();
                    statusDiv.innerHTML = '✅ Гироскоп перезапущен!';
                }
            }, 100);
        });
    </script>
</body>
</html>
