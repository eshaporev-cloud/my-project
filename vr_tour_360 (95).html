<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VR Тур 360 — Профессиональный тур</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@photo-sphere-viewer/core@5/index.min.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #000; }
        #viewer { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }
        
        #plan-wrap {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 12px;
            width: 280px;
            height: 280px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        #plan-wrap:hover {
            transform: scale(1.02);
            border-color: rgba(255, 140, 66, 0.5);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        #plan-wrap.hidden {
            opacity: 0.2;
            transform: scale(0.95);
        }
        #plan-wrap .map-container {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
        }
        #plan-wrap svg {
            width: 100%;
            height: 100%;
        }
        .map-header {
            position: absolute;
            top: 10px;
            left: 14px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 1;
            text-transform: uppercase;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }
        .map-indicator {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 11px;
            color: #ff8c42;
            pointer-events: none;
            z-index: 1;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
        }
        .map-footer {
            position: absolute;
            bottom: 10px;
            left: 14px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 12px;
        }
        .room-shape {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .room-shape:hover {
            filter: brightness(0.85);
            stroke-width: 2.5;
        }
        .room-shape.active {
            animation: mapPulse 1.5s ease-in-out infinite;
        }
        @keyframes mapPulse {
            0%, 100% { opacity: 1; filter: brightness(1); }
            50% { opacity: 0.85; filter: brightness(1.1); }
        }
        .room-label-map {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .room-label-map:hover {
            font-size: 13px !important;
            fill: #ff8c42 !important;
        }
        .lbl {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            color: #fff;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            transition: opacity 0.3s;
            font-weight: 500;
            letter-spacing: -0.3px;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .lbl.hidden { opacity: 0.15; }
        
        @media (max-width: 768px) {
            #plan-wrap { width: 200px; height: 200px; bottom: 16px; right: 16px; padding: 8px; }
            .lbl { font-size: 12px; padding: 8px 20px; white-space: nowrap; }
            .map-header, .map-indicator, .map-footer { font-size: 8px; padding: 2px 6px; }
        }
    </style>
</head>
<body>
<div id="viewer"></div>
<div class="lbl" id="lbl">🎯 Загрузка тура...</div>
<div id="plan-wrap">
    <div class="map-header">🗺️ КАРТА</div>
    <div class="map-indicator" id="mapIndicator">📍</div>
    <div class="map-container" id="mapContainer"></div>
    <div class="map-footer" id="roomCountMap"></div>
</div>

    }
}
</script>

try {
    const binaryStr = atob(svgBase64);
    const bytes = new Uint8Array(binaryStr.length);
    for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
    const svgString = new TextDecoder().decode(bytes);
    document.getElementById('mapContainer').innerHTML = svgString;
    
    if (LABEL_OVERRIDES && Object.keys(LABEL_OVERRIDES).length > 0) {
        setTimeout(() => {
            const svgRect = { width: SVG_W, height: SVG_H };
            const visibleWidth = svgRect.width - PAD * 2;
            const visibleHeight = svgRect.height - PAD * 2;
            
            for (const [roomId, override] of Object.entries(LABEL_OVERRIDES)) {
                const textEl = document.querySelector('#mapContainer text[data-room-id="' + roomId + '"]');
                if (textEl) {
                    if (override.x !== undefined && override.y !== undefined) {
                        const scaleX = visibleWidth / 1000;
                        const scaleY = visibleHeight / 1000;
                        let newX = PAD + override.x * scaleX;
                        let newY = PAD + override.y * scaleY;
                        newX = Math.max(PAD + 5, Math.min(svgRect.width - PAD - 5, newX));
                        newY = Math.max(PAD + 5, Math.min(svgRect.height - PAD - 5, newY));
                        textEl.setAttribute('x', newX);
                        textEl.setAttribute('y', newY);
                    }
                    if (override.fontSize) {
                        let newSize = Math.max(10, Math.min(28, override.fontSize * 0.6));
                        textEl.setAttribute('font-size', newSize);
                    }
                }
            }
        }, 100);
    }
} catch(e) { console.warn(e); }

function updateMapIndicator(roomId) {
    const indicator = document.getElementById('mapIndicator');
    const roomCountSpan = document.getElementById('roomCountMap');
    if (indicator) {
        indicator.style.opacity = '0';
        setTimeout(() => {
            indicator.style.opacity = '1';
            indicator.style.transform = 'scale(1.1)';
            setTimeout(() => indicator.style.transform = 'scale(1)', 200);
        }, 50);
    }
    if (roomCountSpan && ROOMS.length) {
        const currentIdx = ROOMS.findIndex(r => r.id === roomId) + 1;
        roomCountSpan.textContent = currentIdx + ' / ' + ROOMS.length;
    }
}

function initViewer(room) {
    if (viewer) {
        try { viewer.destroy(); } catch(e) {}
    }
    
    viewer = new Viewer({
        container: document.getElementById('viewer'),
        panorama: room.dataUrl,
        navbar: ['zoom', 'fullscreen', 'caption', 'gyroscope', 'vr'],
        caption: room.name,
        defaultZoomLvl: 0,
        minFov: 30,
        maxFov: 110,
        mousewheel: true,
        moveSpeed: 1.5,
        zoomSpeed: 1.2
    });
    
    viewer.addEventListener('ready', () => {
        document.getElementById('lbl').textContent = '📍 ' + current.name;
        updateActiveShape();
        updateMapIndicator(current.id);
    });
    
    viewer.addEventListener('fullscreen', (e) => {
        const plan = document.getElementById('plan-wrap');
        const lbl = document.getElementById('lbl');
        if (e.fullscreen) {
            plan.classList.add('hidden');
            lbl.classList.add('hidden');
        } else {
            plan.classList.remove('hidden');
            lbl.classList.remove('hidden');
        }
    });
}

function updateActiveShape() {
    const shapes = document.querySelectorAll('.room-shape');
    shapes.forEach(shape => {
        if (parseInt(shape.getAttribute('data-room')) === current.id) {
            shape.classList.add('active');
        } else {
            shape.classList.remove('active');
        }
    });
}

function switchRoom(room) {
    if (!room || room.id === current.id) return;
    current = room;
    document.getElementById('lbl').textContent = '⏳ ' + room.name;
    try {
        viewer.setPanorama(room.dataUrl, { caption: room.name, transition: true });
    } catch(e) {
        initViewer(room);
    }
}

setTimeout(() => {
    initViewer(ROOMS[0]);
    
    setTimeout(() => {
        const shapes = document.querySelectorAll('.room-shape');
        const labels = document.querySelectorAll('.room-label-map');
        
        shapes.forEach(shape => {
            const id = parseInt(shape.getAttribute('data-room'));
            const room = ROOMS.find(r => r.id === id);
            if (room) {
                shape.addEventListener('click', () => switchRoom(room));
            }
        });
        
        labels.forEach(label => {
            const id = parseInt(label.getAttribute('data-room-id'));
            const room = ROOMS.find(r => r.id === id);
            if (room) {
                label.addEventListener('click', () => switchRoom(room));
            }
        });
        
        // Двойной клик для сворачивания карты
        let isMinimized = false;
        const planWrap = document.getElementById('plan-wrap');
        planWrap.addEventListener('dblclick', () => {
            isMinimized = !isMinimized;
            if (isMinimized) {
                planWrap.style.width = '48px';
                planWrap.style.height = '48px';
                planWrap.style.borderRadius = '24px';
                planWrap.style.padding = '0';
                planWrap.querySelector('.map-container').style.display = 'none';
                planWrap.querySelector('.map-header').style.display = 'none';
                planWrap.querySelector('.map-footer').style.display = 'none';
            } else {
                planWrap.style.width = window.innerWidth <= 768 ? '200px' : '280px';
                planWrap.style.height = window.innerWidth <= 768 ? '200px' : '280px';
                planWrap.style.borderRadius = '20px';
                planWrap.style.padding = '12px';
                planWrap.querySelector('.map-container').style.display = 'block';
                planWrap.querySelector('.map-header').style.display = 'block';
                planWrap.querySelector('.map-footer').style.display = 'block';
            }
        });
    }, 300);
    
    document.addEventListener('keydown', (e) => {
        if (!ROOMS.length) return;
        let idx = ROOMS.findIndex(r => r.id === current.id);
        if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
            e.preventDefault();
            switchRoom(ROOMS[(idx + 1) % ROOMS.length]);
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
            e.preventDefault();
            switchRoom(ROOMS[(idx - 1 + ROOMS.length) % ROOMS.length]);
        }
    });
}, 200);
